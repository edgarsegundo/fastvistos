<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CTA Connected</title>

  <style>
    body {
      height: 2000px;
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
    }

    .cta {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;

      display: flex;
      align-items: center;
    }

    /* RETÂNGULO */
    .cta-box {
      width: 200px;
      background: white;
      border-radius: 12px;
      padding: 12px 16px 12px 20px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.12);

      display: flex;
      flex-direction: column;
      justify-content: center;

      margin-right: -30px; /* chave pra "grudar" no círculo */
      z-index: 1;

      transition: all 0.25s ease;
    }

    .cta:hover .cta-box {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.18);
    }

    .cta-box strong {
      font-size: 1rem;       /* base: 16px */
      font-weight: 600;
      line-height: 1.2;
    }

    .cta-box span {
      font-size: 12px;
      color: #666;
    }

    /* CÍRCULO */
    .cta-avatar {
      width: 135px;
      height: 135px;
      border-radius: 50%;

      background: white;
      padding: 0;

      box-shadow: 0 10px 25px rgba(0,0,0,0.15);

      display: flex;
      align-items: center;
      justify-content: center;

      z-index: 2;
    }

    .cta-avatar img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* border-radius: 50%; */
    }

    /* LINK GLOBAL */
    .cta-link {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .cta-avatar {
        width: 90px;
        height: 90px;
      }

      .cta-box {
        padding: 10px 14px 10px 18px;
      }

      .cta-box span {
        display: none;
      }
    }

    .cta-powered {
      display: flex;
      flex-direction: column;
      margin-top: 4px;
      line-height: 1;
    }

    .cta-powered span {
      font-size: 10px;
      color: #888;
      margin-bottom: 2px;
    }

    .cta-powered img {
      width: 90px; /* ajusta conforme necessário */
      height: auto;
    }


.cta-title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 1.125rem;
  font-weight: 600;
  line-height: 1.2;
}

.cta-whatsapp {
  width: 14px;
  height: 14px;
  fill: #25D366; /* verde WhatsApp */
  flex-shrink: 0;
}    

  </style>
</head>
<body>

  <div class="cta">

    <div class="cta-box">
      <!-- <strong>Fale com especialista</strong> -->

      <strong class="cta-title">
        <svg viewBox="0 0 32 32" class="cta-whatsapp">
          <path d="M16 3C9.4 3 4 8.4 4 15c0 2.6.8 5 2.2 7l-1.5 5.5 5.6-1.5c1.9 1.1 4 1.7 6.2 1.7 6.6 0 12-5.4 12-12S22.6 3 16 3zm0 21.8c-2 0-3.9-.5-5.5-1.5l-.4-.2-3.3.9.9-3.2-.3-.4c-1.1-1.6-1.7-3.6-1.7-5.6 0-5.6 4.6-10.2 10.2-10.2S26.2 9.4 26.2 15 21.6 24.8 16 24.8zm5.6-7.5c-.3-.2-1.8-.9-2-.9s-.4-.1-.6.2-.7.9-.9 1.1-.3.2-.6.1c-.3-.2-1.2-.4-2.2-1.3-.8-.7-1.3-1.6-1.5-1.9s0-.4.1-.6c.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5s0-.4 0-.6c0-.2-.6-1.6-.8-2.2-.2-.5-.4-.4-.6-.4h-.5c-.2 0-.6.1-.9.4s-1.2 1.1-1.2 2.6 1.2 3 1.4 3.2c.2.2 2.3 3.6 5.6 5 .8.3 1.4.5 1.9.6.8.3 1.5.2 2 .1.6-.1 1.8-.7 2.1-1.4.3-.7.3-1.3.2-1.4-.1-.2-.3-.2-.6-.4z"/>
        </svg>
        Fale com especialista
      </strong>

      <div class="cta-powered">
        <span>Powered by</span>
        <img src="logo-fast-orange.png" alt="Fast Vistos" />
      </div>      
    </div>

    <div class="cta-avatar">
      <img src="fale-conosco2.png" alt="Atendimento" />
    </div>

    <a 
      href="https://wa.me/5511999999999" 
      target="_blank" 
      class="cta-link">
    </a>

  </div>

</body>
</html>
