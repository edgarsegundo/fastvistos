services:
  vitrine:
    container_name: vitrine
    build: .
    ports:
      - "8003:8000"   # 8000 (microservicesadm) e 8002 (empregoadmin) já em uso
    env_file:
      - ./.env
    environment:
      PYTHONOPTIMIZE: "1"
    restart: always
    networks:
      - proxy-network
    volumes:
      - vitrine_staticfiles:/app/staticfiles
      # Repo Astro inteiro montado do host — build_project() roda `npm run
      # build:_saas` via subprocess de dentro deste container, precisa
      # enxergar multi-sites/, node_modules/, package.json etc.
      # AJUSTE o path da esquerda para o path real do repo no seu VPS.
      - /home/edgar/Repos/fastvistos:/app/astro-repo
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  proxy-network:
    external: true
    name: nginx-proxy-network

volumes:
  vitrine_staticfiles:
    external: true
