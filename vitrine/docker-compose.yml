services:
  vitrine:
    container_name: vitrine
    build: .
    ports:
      - "8003:8000"   # 8000 (microservicesadm) e 8002 (empregoadmin) já em uso
    env_file:
      - ./.env
    environment:
      PYTHONOPTIMIZE: "1"
    restart: always
    networks:
      - proxy-network
    # deploybot (usuário SSH restrito) roda no HOST, não dentro deste
    # container — "localhost" de dentro do container não alcança o host.
    # host.docker.internal resolve pro host real (mesmo padrão já usado nos
    # celery workers do emprego/docker-compose.yml). Combina com
    # DEPLOY_SSH_HOST=host.docker.internal no .env.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - vitrine_staticfiles:/app/staticfiles
      # Banco SQLite (settings.py: DATABASES.NAME = BASE_DIR/'data'/'db.sqlite3').
      # SEM isso, cada `docker compose up --build` recria o container e
      # perde TODOS os dados (projetos, usuários, builds) — já aconteceu
      # uma vez (superuser criado sumiu depois de um rebuild).
      - vitrine_db:/app/data
      # Repo Astro inteiro montado do host — build_project() roda `npm run
      # build:_saas` via subprocess de dentro deste container, precisa
      # enxergar multi-sites/, node_modules/, package.json etc.
      #
      # IMPORTANTE: aponta pro clone ISOLADO (fastvistos_saas), NUNCA pro
      # repo legado (fastvistos) — misturar os dois anularia o propósito de
      # ter clonado separado. Se o path no seu VPS for diferente, ajuste
      # aqui (mantendo sempre fastvistos_saas, não fastvistos).
      - /home/edgar/Repos/fastvistos_saas:/app/astro-repo
      # Chave privada SSH do deploybot (gerada no host, em /etc/vitrine/),
      # montada read-only — sem isso DEPLOY_SSH_KEY_PATH não existe dentro
      # do container e core/deploy.py:run_ssh_command() falha.
      - /etc/vitrine/deploy_key:/etc/vitrine/deploy_key:ro
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  proxy-network:
    external: true
    name: nginx-proxy-network

volumes:
  vitrine_staticfiles:
    external: true
  vitrine_db:
