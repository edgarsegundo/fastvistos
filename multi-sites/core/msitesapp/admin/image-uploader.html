<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin Image Uploader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid #e5e7eb; border-top-color: #2563eb;
      animation: spin 0.8s linear infinite;
    }
    /* Overlay entra/sai com transição suave */
    .overlay {
      position: fixed; inset: 0; background: #fff; z-index: 100;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .overlay.open { transform: translateX(0); }
    /* Cropper */
    .cropper-container { max-height: 260px !important; }

    /* Gallery grid — classe separada para não conflitar com hidden (display:none) */
    .gallery-grid-layout {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      align-content: start;
    }
    /* hidden sobrescreve o grid quando necessário */
    .gallery-grid-layout.hidden { display: none; }

    /* Gallery carousel */
    .gallery-carousel-layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      padding: 1rem;
      gap: 0.75rem;
    }
    .gallery-carousel-layout.hidden { display: none; }
  </style>
</head>
<body class="max-w-[480px] mx-auto bg-white min-h-screen">

  <!-- ===== PÁGINA PRINCIPAL ===== -->
  <div id="main-page" class="p-4">

    <!-- Botões de topo: Galeria + Editar Artigo -->
    <div class="flex gap-2 mb-4">
      <button id="btn-gallery"
        class="flex-1 h-11 rounded-xl border border-blue-600 text-blue-600 font-medium hover:bg-blue-50 transition-colors text-sm">
        🖼️ Galeria
      </button>
      <button id="btn-edit-article"
        class="flex-1 h-11 rounded-xl border border-blue-600 text-blue-600 font-medium hover:bg-blue-50 transition-colors text-sm">
        📝 Editar Artigo
      </button>
    </div>

    <!-- Preview da imagem -->
    <div id="preview-container"
      class="rounded-2xl border border-gray-200 bg-gray-50 flex items-center justify-center h-[55vw] max-h-[280px] overflow-hidden mb-3 relative">
      <span id="preview-placeholder" class="text-gray-400 text-sm text-center px-4">
        Selecione um arquivo
      </span>
      <img id="preview-img" src="" alt=""
        class="w-full h-full object-contain hidden" />
      <div id="preview-spinner" class="spinner absolute hidden"></div>
    </div>

    <!-- Tabs upload / clipboard -->
    <div class="flex gap-2 mb-3">
      <button id="tab-upload"
        class="tab-btn w-1/2 h-10 rounded-2xl border border-gray-200 text-sm font-medium transition-colors">
        upload
      </button>
      <button id="tab-clipboard"
        class="tab-btn w-1/2 h-10 rounded-2xl border border-gray-200 text-sm font-medium transition-colors">
        clipboard
      </button>
    </div>

    <!-- Área upload -->
    <div id="area-upload">
      <div class="flex items-center gap-2 mb-2">
        <label for="file-input"
          class="border border-blue-600 text-blue-600 px-3 py-2 rounded-lg text-sm cursor-pointer hover:bg-blue-50 transition-colors shrink-0">
          Escolher arquivo
        </label>
        <input id="file-input" type="file" accept="image/*" class="hidden">
        <span id="file-label" class="text-gray-400 text-sm truncate">nenhum arquivo</span>
      </div>
    </div>

    <!-- Área clipboard -->
    <div id="area-clipboard" class="hidden">
      <p class="text-gray-400 text-sm mb-2">Cole uma imagem (Ctrl+V / Cmd+V)</p>
    </div>

    <!-- Nome do arquivo -->
    <input id="name-input" type="text" placeholder="Nome do arquivo"
      class="w-full border border-gray-200 rounded-xl px-3 h-11 text-sm mb-2 focus:outline-none focus:border-blue-400 transition-colors">

    <!-- Ações da imagem (ficam sempre no DOM, visibilidade controlada) -->
    <div id="image-actions" class="hidden">
      <button id="btn-save"
        class="w-full h-11 rounded-xl bg-blue-600 text-white font-medium mb-2 hover:bg-blue-700 transition-colors disabled:opacity-50">
        Salvar
      </button>
      <button id="btn-adjust"
        class="w-full h-11 rounded-xl border border-blue-600 text-blue-600 font-medium hover:bg-blue-50 transition-colors">
        Ajustar →
      </button>
    </div>

    <!-- Mensagem de erro -->
    <div id="error-msg" class="text-red-500 text-sm mt-2 hidden"></div>

    <hr class="my-4 border-gray-100">

    <!-- Lista de imagens salvas -->
    <div>
      <p class="text-gray-400 text-xs mb-2">Lista de imagens salvas</p>
      <ul id="images-list" class="space-y-1"></ul>
    </div>
  </div>

  <!-- ===== OVERLAY: AJUSTAR IMAGEM ===== -->
  <div id="overlay-adjust" class="overlay">
    <div class="flex items-center justify-between px-4 h-14 border-b border-gray-100 shrink-0">
      <button id="btn-close-adjust" class="text-gray-500 hover:text-gray-900 transition-colors text-sm">← Voltar</button>
      <span class="font-semibold text-sm">Ajustar imagem</span>
      <span class="w-14"></span><!-- spacer -->
    </div>
    <div class="flex-1 overflow-y-auto p-4 space-y-4">

      <!-- Preview do cropper -->
      <div class="flex justify-center bg-black rounded-xl overflow-hidden" style="max-height:260px;">
        <img id="adjust-img" src="" alt="" style="max-height:260px; max-width:100%; object-fit:contain;">
      </div>

      <!-- Crop toggle -->
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" id="crop-check" class="w-4 h-4 accent-blue-600">
        <span class="text-sm">Recortar (arraste na imagem acima)</span>
      </label>

      <!-- Dimensões -->
      <div class="flex items-center gap-2">
        <span class="text-sm text-gray-600 shrink-0">Tamanho:</span>
        <input id="adj-width" type="number" placeholder="W"
          class="border border-gray-200 rounded-lg px-2 h-9 w-20 text-sm focus:outline-none focus:border-blue-400">
        <span class="text-gray-400">×</span>
        <input id="adj-height" type="number" placeholder="H"
          class="border border-gray-200 rounded-lg px-2 h-9 w-20 text-sm focus:outline-none focus:border-blue-400">
        <span class="text-xs text-gray-400" id="adj-orig-size"></span>
      </div>

      <!-- Sliders -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-500">Brilho <span id="lbl-brightness">0</span></label>
          <input id="adj-brightness" type="range" min="-100" max="100" value="0" class="w-full accent-blue-600">
        </div>
        <div>
          <label class="text-xs text-gray-500">Contraste <span id="lbl-contrast">0</span></label>
          <input id="adj-contrast" type="range" min="-100" max="100" value="0" class="w-full accent-blue-600">
        </div>
        <div>
          <label class="text-xs text-gray-500">Saturação <span id="lbl-saturation">0</span></label>
          <input id="adj-saturation" type="range" min="-100" max="100" value="0" class="w-full accent-blue-600">
        </div>
        <div>
          <label class="text-xs text-gray-500">Qualidade WebP <span id="lbl-quality">82</span></label>
          <input id="adj-quality" type="range" min="1" max="100" value="82" class="w-full accent-blue-600">
        </div>
      </div>

      <!-- Checkboxes -->
      <div class="flex gap-6">
        <label class="flex items-center gap-2 cursor-pointer text-sm">
          <input type="checkbox" id="adj-sharpen" class="w-4 h-4 accent-blue-600"> Nitidez
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-sm">
          <input type="checkbox" id="adj-grayscale" class="w-4 h-4 accent-blue-600"> Escala de cinza
        </label>
      </div>

      <!-- Alt text -->
      <div>
        <label class="text-xs text-gray-500 mb-1 block">Alt text</label>
        <input id="adj-alt" type="text" placeholder="Descrição da imagem"
          class="w-full border border-gray-200 rounded-xl px-3 h-11 text-sm focus:outline-none focus:border-blue-400">
      </div>

      <!-- Aplicar -->
      <button id="btn-apply-adjust"
        class="w-full h-11 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 transition-colors">
        Aplicar ajustes
      </button>
    </div>
  </div>

  <!-- ===== OVERLAY: EDITAR ARTIGO ===== -->
  <div id="overlay-edit-article" class="overlay">
    <div class="flex items-center justify-between px-4 h-14 border-b border-gray-100 shrink-0">
      <button id="btn-close-edit-article" class="text-gray-500 hover:text-gray-900 transition-colors text-sm">← Voltar</button>
      <span class="font-semibold text-sm">Editar artigo (Markdown)</span>
      <span class="w-14"></span>
    </div>
    <div class="flex flex-col flex-1 p-4 gap-3">
      <div id="edit-article-spinner" class="flex justify-center py-8 hidden">
        <div class="spinner"></div>
      </div>
      <textarea id="edit-article-textarea"
        class="flex-1 border border-gray-200 rounded-xl p-3 text-sm resize-none focus:outline-none focus:border-blue-400 transition-colors"
        placeholder="Markdown do artigo..." style="min-height: 300px;"></textarea>
      <div id="edit-article-error" class="text-red-500 text-sm hidden"></div>
      <button id="btn-save-article"
        class="w-full h-11 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 transition-colors disabled:opacity-50">
        Salvar artigo
      </button>
    </div>
  </div>

  <!-- ===== OVERLAY: GALERIA ===== -->
  <div id="overlay-gallery" class="overlay">

    <!-- Header -->
    <div class="flex items-center justify-between px-4 h-14 border-b border-gray-100 shrink-0">
      <button id="btn-close-gallery" class="text-gray-500 hover:text-gray-900 transition-colors text-sm">← Voltar</button>
      <span class="font-semibold text-sm">Galeria</span>
      <!-- Toggle grade / carousel -->
      <div class="flex rounded-lg overflow-hidden border border-gray-200 text-sm">
        <button id="btn-gallery-grid"
          class="px-3 h-8 transition-colors" title="Grade">⊞</button>
        <button id="btn-gallery-carousel"
          class="px-3 h-8 transition-colors border-l border-gray-200" title="Carousel">▶</button>
      </div>
    </div>

    <!-- Spinner -->
    <div id="gallery-spinner" class="hidden flex justify-center py-6 shrink-0">
      <div class="spinner"></div>
    </div>

    <!-- Erro -->
    <div id="gallery-error" class="hidden text-red-500 text-sm px-4 pt-3 shrink-0"></div>

    <!-- MODO GRADE: scroll vertical, 3 colunas, células de tamanho fixo -->
    <div id="gallery-grid"
      class="gallery-grid-layout flex-1 overflow-y-auto p-3">
    </div>

    <!-- MODO CAROUSEL -->
    <div id="gallery-carousel" class="gallery-carousel-layout hidden">
      <!-- Imagem -->
      <div class="w-full flex items-center justify-center bg-gray-50 rounded-2xl overflow-hidden relative" style="height: 280px;">
        <img id="gallery-carousel-img" src="" alt=""
          class="max-w-full max-h-full object-contain">
        <!-- Feedback visual de seleção -->
        <div id="gallery-carousel-check"
          class="absolute inset-0 flex items-center justify-center text-6xl pointer-events-none transition-opacity duration-300 bg-black/10"
          style="opacity:0;">
          ✅
        </div>
        <!-- Setas sobrepostas -->
        <button id="btn-carousel-prev"
          class="absolute left-2 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-white/90 shadow text-xl flex items-center justify-center text-gray-700 hover:bg-white transition-colors disabled:opacity-30">
          ‹
        </button>
        <button id="btn-carousel-next"
          class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-white/90 shadow text-xl flex items-center justify-center text-gray-700 hover:bg-white transition-colors disabled:opacity-30">
          ›
        </button>
      </div>
      <!-- Info -->
      <div class="w-full flex items-center justify-between text-sm text-gray-500 shrink-0">
        <span id="gallery-carousel-name" class="truncate max-w-[70%]"></span>
        <span id="gallery-carousel-count" class="shrink-0 text-xs"></span>
      </div>
      <!-- Botão adicionar -->
      <button id="btn-carousel-select"
        class="w-full h-11 rounded-xl border border-blue-600 text-blue-600 font-medium hover:bg-blue-50 transition-colors shrink-0">
        Adicionar à lista
      </button>
    </div>

    <!-- Paginação (rodapé fixo) -->
    <div class="shrink-0 flex items-center justify-between px-4 h-12 border-t border-gray-100">
      <button id="btn-gallery-prev"
        class="h-8 px-3 rounded-lg border border-gray-200 text-sm text-gray-600 hover:bg-gray-50 transition-colors disabled:opacity-30">
        ← Anterior
      </button>
      <span id="gallery-page-info" class="text-xs text-gray-400">1 / 1</span>
      <button id="btn-gallery-next"
        class="h-8 px-3 rounded-lg border border-gray-200 text-sm text-gray-600 hover:bg-gray-50 transition-colors disabled:opacity-30">
        Próxima →
      </button>
    </div>
  </div>

  <script src="static/adjust.js"></script>
  <script src="static/editArticle.js"></script>
  <script src="static/gallery.js"></script>
  <script src="static/app.js"></script>
</body>
</html>
