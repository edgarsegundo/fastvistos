<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
.card-opacity {
  width: 400px;
  height: 300px;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  background: white;
  font-family: sans-serif;
}

.card-opacity::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 60%;
  background: url('./images/1/aviao.jpeg') center/cover no-repeat;
  

  /* Gradiente com mais paradas para transição mais suave */
  /* mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 50%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.2) 80%, rgba(0,0,0,0) 100%);
  -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 50%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.2) 80%, rgba(0,0,0,0) 100%); */

mask-image: linear-gradient(
  to bottom,
  rgba(0,0,0,1) 40%,   /* Parte superior totalmente visível */
  rgba(0,0,0,0.8) 55%,  /* começa a clarear levemente */
  rgba(0,0,0,0.6) 65%,  /* transição média */
  rgba(0,0,0,0.4) 75%,  /* metade da transição final */
  rgba(0,0,0,0.2) 85%,  /* quase sumindo */
  rgba(0,0,0,0) 100%    /* totalmente transparente no final */
);
-webkit-mask-image: linear-gradient(
  to bottom,
  rgba(0,0,0,1) 40%,
  rgba(0,0,0,0.8) 55%,
  rgba(0,0,0,0.6) 65%,
  rgba(0,0,0,0.4) 75%,
  rgba(0,0,0,0.2) 85%,
  rgba(0,0,0,0) 100%
);


}


.card-opacity .card-content {
  position: absolute;
  top: 0;
  width: 100%;
  height: 60%;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 16px;
  color: white;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}

.card-opacity .card-footer {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  padding: 16px;
  box-sizing: border-box;
  color: #333;
}
  </style>
</head>
<body>

<div class="card card-opacity">
  <div class="card-content">
    <h2>Título Colorido</h2>
    <p>Texto sobre a parte colorida</p>
  </div>
  <div class="card-footer">
    <p>Texto sobre a parte branca</p>
  </div>
</div>

</body>
</html>
