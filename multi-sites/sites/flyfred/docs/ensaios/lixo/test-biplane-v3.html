<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piloto 3D — Editor de Trajetória com Mouse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
      max-width: 280px;
    }

    #status {
      background: rgba(0,0,0,0.6);
      color: #00ff88;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.9;
    }

    #vel-bar-wrap {
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 8px;
    }
    #vel-bar-label {
      color: #f39c12;
      font-size: 11px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    #vel-bar-track {
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }
    #vel-bar-fill {
      height: 100%;
      width: 50%;
      background: #f1c40f;
      border-radius: 4px;
      transition: width 0.2s, background 0.2s;
    }

    #controls-hint {
      background: rgba(0,0,0,0.5);
      color: #aaa;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 10px;
      line-height: 1.9;
    }
    #controls-hint b { color: #fff; }

    #buttons {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    button {
      padding: 7px 10px;
      border: none;
      border-radius: 6px;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { opacity: 0.8; transform: scale(1.02); }
    button.active { 
      box-shadow: 0 0 0 2px white, 0 0 0 4px #3498db;
    }

    #btn-draw    { background: #9b59b6; color: white; }
    #btn-draw.active { background: #8e44ad; }
    #btn-play-path { background: #2ecc71; color: white; }
    #btn-clear-path { background: #e74c3c; color: white; }
    #btn-save-path { background: #3498db; color: white; }
    #btn-stop { background: #e67e22; color: white; }
    #btn-speed-up { background: #f39c12; color: white; }
    #btn-speed-down { background: #f39c12; color: white; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }

    #trajectory-count {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      color: #f39c12;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
    }

    #attitude {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      width: 90px;
      height: 90px;
      border: 2px solid rgba(255,255,255,0.3);
    }
    #attitude canvas { border-radius: 50%; }

    .mode-indicator {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: rgba(0,0,0,0.7);
      padding: 8px 16px;
      border-radius: 8px;
      color: #ffaa00;
      font-size: 12px;
      font-family: monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="ui">
    <div id="status">loading...</div>

    <div id="vel-bar-wrap">
      <div id="vel-bar-label">
        <span>velocidade do voo</span>
        <span id="vel-text">100%</span>
      </div>
      <div id="vel-bar-track"><div id="vel-bar-fill" style="width:100%"></div></div>
    </div>

    <div id="controls-hint">
      <b>✏️ MODO DESENHO</b><br>
      Clique e arraste na tela para desenhar a trajetória<br>
      Solte o mouse para finalizar<br><br>
      <b>🎮 CONTROLES</b><br>
      DRAW — ativar modo desenho<br>
      PLAY — voar na trajetória<br>
      CLEAR — apagar trajetória<br>
      SAVE — salvar em JSON<br>
      +/- VEL — ajustar velocidade
    </div>

    <div id="buttons">
      <button id="btn-draw">✏️ DRAW</button>
      <button id="btn-play-path">▶ PLAY</button>
      <button id="btn-stop">⏹ STOP</button>
      <button id="btn-clear-path">🗑 CLEAR</button>
      <button id="btn-save-path">💾 SAVE</button>
      <button id="btn-speed-down">🐢 -VEL</button>
      <button id="btn-speed-up">🚀 +VEL</button>
    </div>
  </div>

  <div id="trajectory-count">pontos: 0</div>
  <div id="attitude"><canvas id="attitude-canvas" width="90" height="90"></canvas></div>
  <div class="mode-indicator" id="mode-indicator">✈️ MODO: PILOTO</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

  <script>
  // ═══════════════════════════════════════════════════════════════════════════
  // CENA
  // ═══════════════════════════════════════════════════════════════════════════
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a2a);
  scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 12);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Iluminação
  scene.add(new THREE.AmbientLight(0x404060, 0.6));
  const sun = new THREE.DirectionalLight(0xffcc88, 1);
  sun.position.set(5, 10, 7);
  scene.add(sun);
  const fill = new THREE.DirectionalLight(0x88aaff, 0.4);
  fill.position.set(-3, 2, -4);
  scene.add(fill);
  
  // Grade de referência
  const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
  gridHelper.position.y = -1.5;
  scene.add(gridHelper);
  
  // Eixos de referência
  const axesHelper = new THREE.AxesHelper(5);
  axesHelper.material.transparent = true;
  axesHelper.material.opacity = 0.2;
  scene.add(axesHelper);

  const material = new THREE.MeshPhongMaterial({ color: 0xcc3300, specular: 0x666666, shininess: 60 });
  let airplane = null, baseScale = 1;

  // ═══════════════════════════════════════════════════════════════════════════
  // SISTEMA DE DESENHO DE TRAJETÓRIA
  // ═══════════════════════════════════════════════════════════════════════════
  const DrawSystem = {
    isDrawing: false,
    points: [],
    curve: null,
    lineObject: null,
    sphereMarkers: [],
    minDistance: 0.15, // Distância mínima entre pontos
    speed: 0.005,      // Velocidade de percurso
    t: 0,              // Parâmetro da curva (0 a 1)
    isPlaying: false,
    
    // Ativar modo desenho
    activate() {
      this.isDrawing = false;
      this.points = [];
      this.clearVisualization();
      document.getElementById('mode-indicator').innerHTML = '✏️ MODO: DESENHO (clique e arraste)';
      document.getElementById('btn-draw').classList.add('active');
    },
    
    // Desativar modo desenho
    deactivate() {
      this.isDrawing = false;
      document.getElementById('mode-indicator').innerHTML = '✈️ MODO: PILOTO';
      document.getElementById('btn-draw').classList.remove('active');
    },
    
    // Converter coordenadas do mouse para mundo 3D
    mouseToWorld(mouseX, mouseY) {
      const vector = new THREE.Vector3(mouseX, mouseY, 0.5);
      vector.unproject(camera);
      const dir = vector.sub(camera.position).normalize();
      const distance = (0 - camera.position.y) / dir.y;
      const pos = camera.position.clone().add(dir.multiplyScalar(distance));
      return new THREE.Vector3(pos.x, pos.y, pos.z);
    },
    
    // Iniciar desenho
    startDrawing(x, y) {
      if (!document.getElementById('btn-draw').classList.contains('active')) return;
      this.isDrawing = true;
      this.points = [];
      this.clearVisualization();
      const worldPos = this.mouseToWorld(x, y);
      this.points.push(worldPos.clone());
      this.updateVisualization();
    },
    
    // Durante o desenho
    draw(x, y) {
      if (!this.isDrawing) return;
      const worldPos = this.mouseToWorld(x, y);
      const lastPoint = this.points[this.points.length - 1];
      if (lastPoint.distanceTo(worldPos) > this.minDistance) {
        this.points.push(worldPos.clone());
        this.updateVisualization();
      }
    },
    
    // Finalizar desenho e gerar curva
    endDrawing() {
      if (!this.isDrawing) return;
      this.isDrawing = false;
      if (this.points.length < 3) {
        console.log('Pontos insuficientes para criar curva');
        return;
      }
      this.generateCurve();
      this.deactivate();
    },
    
    // Gerar curva suave a partir dos pontos
    generateCurve() {
      // Usar CatmullRomCurve3 para suavização automática
      this.curve = new THREE.CatmullRomCurve3(this.points);
      this.curve.curveType = 'centripetal';
      this.curve.closed = false;
      
      // Visualizar a curva final
      this.visualizeCurve();
      
      document.getElementById('trajectory-count').textContent = `pontos: ${this.points.length} | curva suave gerada`;
    },
    
    // Visualizar pontos e curva
    visualizeCurve() {
      // Remover visualização antiga
      this.clearVisualization();
      
      // Desenhar pontos como esferas
      this.points.forEach((p, i) => {
        const sphereGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.position.copy(p);
        scene.add(sphere);
        this.sphereMarkers.push(sphere);
      });
      
      // Desenhar linha da curva
      if (this.curve) {
        const curvePoints = this.curve.getPoints(200);
        const lineGeo = new THREE.BufferGeometry().setFromPoints(curvePoints);
        const lineMat = new THREE.LineBasicMaterial({ color: 0x44ffaa, linewidth: 2 });
        this.lineObject = new THREE.Line(lineGeo, lineMat);
        scene.add(this.lineObject);
      }
    },
    
    clearVisualization() {
      if (this.lineObject) scene.remove(this.lineObject);
      this.sphereMarkers.forEach(m => scene.remove(m));
      this.sphereMarkers = [];
    },
    
    // Iniciar voo automático na curva
    startFlight() {
      if (!this.curve || this.points.length < 2) {
        alert('Desenhe uma trajetória primeiro (botão DRAW)');
        return;
      }
      this.isPlaying = true;
      this.t = 0;
      document.getElementById('mode-indicator').innerHTML = '🎬 MODO: VOO AUTOMÁTICO';
      document.getElementById('btn-play-path').style.opacity = '0.6';
    },
    
    stopFlight() {
      this.isPlaying = false;
      document.getElementById('mode-indicator').innerHTML = '✈️ MODO: PILOTO';
      document.getElementById('btn-play-path').style.opacity = '1';
    },
    
    // Atualizar posição do avião na curva
    updateFlight() {
      if (!this.isPlaying || !airplane || !this.curve) return;
      
      this.t += this.speed;
      if (this.t >= 1) {
        this.t = 0; // Loop infinito
      }
      
      const pos = this.curve.getPoint(this.t);
      airplane.position.copy(pos);
      
      // Rotação automática baseada na tangente da curva
      const tangent = this.curve.getTangent(this.t).normalize();
      
      // Calcular ângulos de Euler a partir do vetor direção
      const yaw = Math.atan2(tangent.x, tangent.z);
      const pitch = Math.asin(Math.max(-1, Math.min(1, tangent.y)));
      
      // Roll baseado na curvatura (efeito cinematográfico)
      const deltaT = 0.05;
      const t2 = Math.min(1, this.t + deltaT);
      const pos2 = this.curve.getPoint(t2);
      const dir2 = new THREE.Vector3().subVectors(pos2, pos).normalize();
      const cross = new THREE.Vector3().crossVectors(tangent, dir2);
      const roll = cross.y * 2;
      
      airplane.rotation.set(pitch, yaw, Math.min(0.5, Math.max(-0.5, roll)));
      
      // Escala dinâmica baseada na profundidade
      const scaleBoost = 1 + THREE.MathUtils.clamp(pos.z * 0.12, -0.3, 1.2);
      const finalScale = Math.max(0.3, baseScale * scaleBoost);
      airplane.scale.setScalar(finalScale);
      
      // Atualizar status
      document.getElementById('status').innerHTML =
        `<span style="color:#aaa">TRAJETÓRIA</span><br>` +
        `progresso: ${(this.t * 100).toFixed(1)}%<br>` +
        `posição: x:${pos.x.toFixed(2)} y:${pos.y.toFixed(2)} z:${pos.z.toFixed(2)}<br>` +
        `pitch:${pitch.toFixed(2)}° yaw:${yaw.toFixed(2)}°<br>` +
        `<span style="color:#88ff88">🎬 VOO AUTOMÁTICO</span>`;
      
      // Atualizar indicador de atitude
      drawAttitude(pitch, roll);
      
      // Câmera dinâmica durante o voo
      camera.position.x = THREE.MathUtils.lerp(camera.position.x, pos.x * 0.2, 0.05);
      camera.position.y = THREE.MathUtils.lerp(camera.position.y, pos.y * 0.15 + 1, 0.05);
      camera.position.z = 12 - pos.z * 0.15;
      camera.position.z = Math.max(7, Math.min(15, camera.position.z));
      camera.lookAt(pos);
    },
    
    // Ajustar velocidade
    setSpeed(factor) {
      this.speed = Math.max(0.001, Math.min(0.03, this.speed * factor));
      const percent = (this.speed / 0.03) * 100;
      document.getElementById('vel-bar-fill').style.width = percent + '%';
      document.getElementById('vel-text').textContent = `${Math.round(percent)}%`;
    },
    
    // Limpar tudo
    clear() {
      this.stopFlight();
      this.points = [];
      this.curve = null;
      this.clearVisualization();
      document.getElementById('trajectory-count').textContent = 'pontos: 0';
      this.deactivate();
    },
    
    // Salvar trajetória em JSON
    save() {
      if (!this.points.length) {
        alert('Nenhuma trajetória para salvar');
        return;
      }
      const data = {
        points: this.points.map(p => ({ x: p.x, y: p.y, z: p.z })),
        speed: this.speed,
        timestamp: new Date().toISOString()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `trajectory_${Date.now()}.json`;
      a.click();
      alert('Trajetória salva!');
    },
    
    // Carregar trajetória de JSON
    load(jsonData) {
      try {
        const data = JSON.parse(jsonData);
        this.points = data.points.map(p => new THREE.Vector3(p.x, p.y, p.z));
        this.speed = data.speed || 0.005;
        this.generateCurve();
        this.setSpeed(1);
        document.getElementById('trajectory-count').textContent = `pontos: ${this.points.length} | carregado`;
      } catch(e) {
        console.error('Erro ao carregar:', e);
      }
    }
  };

  // ═══════════════════════════════════════════════════════════════════════════
  // INDICADOR DE ATITUDE
  // ═══════════════════════════════════════════════════════════════════════════
  const attCtx = document.getElementById('attitude-canvas').getContext('2d');

  function drawAttitude(pitch, roll) {
    const cx = 45, cy = 45, r = 40;
    attCtx.clearRect(0, 0, 90, 90);
    attCtx.save();
    attCtx.beginPath();
    attCtx.arc(cx, cy, r, 0, Math.PI * 2);
    attCtx.clip();
    attCtx.save();
    attCtx.translate(cx, cy);
    attCtx.rotate(-roll);
    const pitchOffset = pitch * 60;
    attCtx.fillStyle = '#3a6ea5';
    attCtx.fillRect(-r, -r * 2, r * 2, r * 2 + pitchOffset);
    attCtx.fillStyle = '#6b4c3b';
    attCtx.fillRect(-r, pitchOffset, r * 2, r * 2);
    attCtx.strokeStyle = 'white';
    attCtx.lineWidth = 1.5;
    attCtx.beginPath();
    attCtx.moveTo(-r, pitchOffset);
    attCtx.lineTo(r, pitchOffset);
    attCtx.stroke();
    attCtx.restore();
    attCtx.strokeStyle = '#ffcc00';
    attCtx.lineWidth = 2;
    attCtx.beginPath();
    attCtx.moveTo(cx - 14, cy); attCtx.lineTo(cx - 5, cy);
    attCtx.moveTo(cx + 5, cy);  attCtx.lineTo(cx + 14, cy);
    attCtx.moveTo(cx, cy - 1);  attCtx.lineTo(cx, cy + 1);
    attCtx.stroke();
    attCtx.restore();
    attCtx.strokeStyle = 'rgba(255,255,255,0.3)';
    attCtx.beginPath();
    attCtx.arc(cx, cy, r, 0, Math.PI * 2);
    attCtx.stroke();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // EVENTOS DO MOUSE
  // ═══════════════════════════════════════════════════════════════════════════
  function getMouseCoords(event) {
    const rect = renderer.domElement.getBoundingClientRect();
    const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    return { x, y };
  }

  renderer.domElement.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    const { x, y } = getMouseCoords(e);
    DrawSystem.startDrawing(x, y);
  });

  renderer.domElement.addEventListener('mousemove', (e) => {
    const { x, y } = getMouseCoords(e);
    DrawSystem.draw(x, y);
  });

  renderer.domElement.addEventListener('mouseup', () => {
    DrawSystem.endDrawing();
  });

  // ═══════════════════════════════════════════════════════════════════════════
  // BOTÕES
  // ═══════════════════════════════════════════════════════════════════════════
  document.getElementById('btn-draw').addEventListener('click', () => {
    DrawSystem.activate();
  });
  
  document.getElementById('btn-play-path').addEventListener('click', () => {
    DrawSystem.startFlight();
  });
  
  document.getElementById('btn-stop').addEventListener('click', () => {
    DrawSystem.stopFlight();
  });
  
  document.getElementById('btn-clear-path').addEventListener('click', () => {
    DrawSystem.clear();
  });
  
  document.getElementById('btn-save-path').addEventListener('click', () => {
    DrawSystem.save();
  });
  
  document.getElementById('btn-speed-up').addEventListener('click', () => {
    DrawSystem.setSpeed(1.2);
  });
  
  document.getElementById('btn-speed-down').addEventListener('click', () => {
    DrawSystem.setSpeed(0.8);
  });

  // ═══════════════════════════════════════════════════════════════════════════
  // MODELO DO AVIÃO
  // ═══════════════════════════════════════════════════════════════════════════
  const loader = new THREE.OBJLoader();
  loader.load('./3d/uploads_files_2532780_Gamecock.obj', function(obj) {
    obj.traverse(c => { if (c.isMesh) c.material = material; });
    const box = new THREE.Box3().setFromObject(obj);
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(...box.getSize(new THREE.Vector3()).toArray());
    baseScale = 0.5 / maxDim;
    obj.position.sub(center.multiplyScalar(baseScale));
    obj.scale.setScalar(baseScale);
    airplane = obj;
    scene.add(airplane);
  }, null, e => console.error(e));

  // ═══════════════════════════════════════════════════════════════════════════
  // ANIMAÇÃO
  // ═══════════════════════════════════════════════════════════════════════════
  function animate() {
    requestAnimationFrame(animate);
    
    if (airplane && DrawSystem.isPlaying) {
      DrawSystem.updateFlight();
    } else if (airplane && !DrawSystem.isPlaying) {
      // Modo estático ou manual
      document.getElementById('status').innerHTML = 
        `<span style="color:#aaa">✏️ DESENHE UMA TRAJETÓRIA</span><br>` +
        `1. Clique em DRAW<br>` +
        `2. Arraste o mouse na tela<br>` +
        `3. Clique em PLAY para voar`;
    }
    
    renderer.render(scene, camera);
  }
  
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Velocidade inicial
  DrawSystem.setSpeed(1);
  </script>
</body>
</html>
