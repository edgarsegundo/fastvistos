<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Flight Path Editor</title>
<style>
body { margin:0; overflow:hidden; background:#0a0a2a; font-family:monospace; }
#ui {
  position:absolute; top:15px; left:15px; z-index:10;
  display:flex; gap:8px; flex-wrap:wrap;
}
button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}
#btn-export { background:#4CAF50; color:white; }
#info {
  position:absolute;
  right:15px;
  top:15px;
  color:#fff;
  background:rgba(0,0,0,.5);
  padding:10px;
  border-radius:8px;
  line-height: 1.7;
}
#progress {
  display:none;
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  color:#fff;
  padding:12px 24px;
  border-radius:8px;
  font-size:16px;
}
</style>
</head>
<body>

<div id="ui">
  <button id="btn-play">▶ PLAY</button>
  <button id="btn-stop">⏹ STOP</button>
  <button id="btn-clear">🗑 CLEAR</button>
  <button id="btn-export">🎬 EXPORT PNGs</button>
</div>

<div id="info">
  Clique = waypoint<br>
  Arraste = editar ponto<br>
  Scroll = profundidade Z<br>
  <br>
  1. Adicione pontos<br>
  2. PLAY para visualizar<br>
  3. EXPORT para gerar ZIP
</div>

<div id="progress">Aguarde...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

<script>
// Cena com fundo azul para preview
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2a);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const sun = new THREE.DirectionalLight(0xffcc88, 1);
sun.position.set(5, 10, 7);
scene.add(sun);

const grid = new THREE.GridHelper(20, 20);
scene.add(grid);

const raycaster = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

let airplane = null;
let baseScale = 1;

const material = new THREE.MeshPhongMaterial({ color: 0xcc3300, shininess: 60 });

const Editor = {
  points: [],
  markers: [],
  curve: null,
  line: null,
  selected: null,
  dragging: false,
  playing: false,
  t: 0,
  speed: 0.003,
  roll: 0,

  mouseToWorld(x, y) {
    raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
    const p = new THREE.Vector3();
    raycaster.ray.intersectPlane(groundPlane, p);
    return p;
  },

  addPoint(x, y) {
    const p = this.mouseToWorld(x, y);
    this.points.push(p);
    const marker = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 12, 12),
      new THREE.MeshStandardMaterial({ color: 0xffaa44 })
    );
    marker.position.copy(p);
    scene.add(marker);
    this.markers.push(marker);
    if (this.points.length >= 3) this.buildCurve();
  },

  buildCurve() {
    this.curve = new THREE.CatmullRomCurve3(this.points);
    this.curve.curveType = 'centripetal';
    if (this.line) scene.remove(this.line);
    const pts = this.curve.getPoints(300);
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: 0x44ffaa });
    this.line = new THREE.Line(geo, mat);
    scene.add(this.line);
  },

  pickMarker(x, y) {
    raycaster.setFromCamera(new THREE.Vector2(x, y), camera);
    const hits = raycaster.intersectObjects(this.markers);
    if (hits.length) {
      this.selected = this.markers.indexOf(hits[0].object);
      this.dragging = true;
    }
  },

  dragPoint(x, y) {
    if (this.selected === null) return;
    const p = this.mouseToWorld(x, y);
    this.points[this.selected].x = p.x;
    this.points[this.selected].y = p.y;
    this.markers[this.selected].position.copy(this.points[this.selected]);
    this.buildCurve();
  },

  changeDepth(delta) {
    if (this.selected === null) return;
    this.points[this.selected].z += delta * 0.002;
    this.markers[this.selected].position.copy(this.points[this.selected]);
    this.buildCurve();
  },

  startFlight() {
    if (!this.curve) return;
    this.playing = true;
    this.t = 0;
    this.roll = 0;
  },

  stopFlight() {
    this.playing = false;
  },

  updateFlight() {
    if (!this.playing || !this.curve || !airplane) return;

    this.t += this.speed;
    if (this.t > 1) this.t = 0;

    const pos = this.curve.getPoint(this.t);
    const tangent = this.curve.getTangent(this.t);

    airplane.position.copy(pos);

    const yaw = Math.atan2(tangent.x, tangent.z);
    const pitch = -Math.atan2(tangent.y, Math.sqrt(tangent.x * tangent.x + tangent.z * tangent.z));
    const t2 = Math.min(1, this.t + 0.01);
    const tan2 = this.curve.getTangent(t2);
    const force = tangent.clone().cross(tan2).y;

    this.roll = THREE.MathUtils.lerp(this.roll, force * 4, 0.08);
    airplane.rotation.set(pitch, yaw, this.roll);

    const scaleBoost = 1 + THREE.MathUtils.clamp(pos.z * 0.08, -0.2, 1);
    airplane.scale.setScalar(baseScale * scaleBoost);

    // Preview: câmera segue levemente
    camera.position.x = THREE.MathUtils.lerp(camera.position.x, pos.x * 0.2, 0.03);
    camera.position.y = THREE.MathUtils.lerp(camera.position.y, pos.y * 0.15 + 1, 0.03);
    camera.position.z = THREE.MathUtils.lerp(camera.position.z, 12 - pos.z * 0.12, 0.03);
    camera.lookAt(pos);
  },

  clear() {
    this.points = [];
    this.markers.forEach(m => scene.remove(m));
    this.markers = [];
    if (this.line) scene.remove(this.line);
    this.curve = null;
    this.selected = null;
  },

  // Keyframes calculados matematicamente — câmera FIXA
  // igual ao save() original que funcionava, sem lerp de câmera
  _buildKeyframes() {
    const frames = [];
    let roll = 0;

    for (let i = 0; i <= 300; i++) {
      const t = i / 300;
      const pos = this.curve.getPoint(t);
      const tangent = this.curve.getTangent(t);

      const yaw = Math.atan2(tangent.x, tangent.z);
      const pitch = -Math.atan2(tangent.y, Math.sqrt(tangent.x * tangent.x + tangent.z * tangent.z));
      const t2 = Math.min(1, t + 0.01);
      const tan2 = this.curve.getTangent(t2);
      roll = THREE.MathUtils.lerp(roll, tangent.clone().cross(tan2).y * 4, 0.08);
      const scale = 1 + THREE.MathUtils.clamp(pos.z * 0.08, -0.2, 1);

      frames.push({ x: pos.x, y: pos.y, z: pos.z, yaw, pitch, roll, scale });
    }

    return frames;
  },

  async exportFrames() {
    if (!this.curve || !airplane) {
      alert('Defina um caminho antes de exportar!');
      return;
    }

    const progress = document.getElementById('progress');
    progress.style.display = 'block';
    progress.textContent = 'Calculando keyframes...';

    const keyframes = this._buildKeyframes();
    const TOTAL_FRAMES = keyframes.length;

    // Serializa keyframes para JSON
    const keyframesJson = JSON.stringify(keyframes, null, 2);

    // ── Modo export: transparente, sem grid, sem markers, sem linha
    scene.background = null;
    renderer.setClearColor(0x000000, 0);
    grid.visible = false;
    this.markers.forEach(m => m.visible = false);
    if (this.line) this.line.visible = false;

    // Câmera fixa — avião se move de verdade pelo frame
    camera.position.set(0, 2, 12);

    const frames = [];

    for (let i = 0; i < TOTAL_FRAMES; i++) {
      const f = keyframes[i];

      airplane.position.set(f.x, f.y, f.z);
      airplane.rotation.set(f.pitch, f.yaw, f.roll);
      airplane.scale.setScalar(baseScale * f.scale);
      camera.lookAt(new THREE.Vector3(f.x, f.y, f.z));

      renderer.render(scene, camera);

      const blob = await new Promise(resolve =>
        renderer.domElement.toBlob(resolve, 'image/png')
      );
      frames.push({ name: `plane-${String(i + 1).padStart(4, '0')}.png`, blob });

      progress.textContent = `Capturando frame ${i + 1} / ${TOTAL_FRAMES}...`;
      await new Promise(r => setTimeout(r, 8));
    }

    // ── Restaura modo preview
    scene.background = new THREE.Color(0x0a0a2a);
    renderer.setClearColor(0x0a0a2a, 1);
    grid.visible = true;
    this.markers.forEach(m => m.visible = true);
    if (this.line) this.line.visible = true;

    progress.textContent = 'Gerando ZIP...';

    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    document.head.appendChild(script);
    await new Promise(r => script.onload = r);


    const zip = new JSZip();
    // Adiciona PNGs
    frames.forEach(({ name, blob }) => zip.file(name, blob));
    // Adiciona keyframes.json
    zip.file('plane-keyframes.json', keyframesJson);

    const zipBlob = await zip.generateAsync({ type: 'blob' }, (meta) => {
      progress.textContent = `Comprimindo... ${meta.percent.toFixed(0)}%`;
    });

    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = 'plane-frames.zip';
    a.click();

    progress.textContent = `✅ ${TOTAL_FRAMES} frames exportados!`;
    setTimeout(() => progress.style.display = 'none', 4000);

    console.log(`\nFFmpeg:\nffmpeg -framerate 30 -i plane-%04d.png -c:v libvpx-vp9 -pix_fmt yuva420p -b:v 0 -crf 30 plane-loop.webm`);
  }
};

// ── Eventos
renderer.domElement.addEventListener('click', e => {
  if (Editor.dragging) return;
  Editor.addPoint((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
});
renderer.domElement.addEventListener('mousedown', e => {
  Editor.pickMarker((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
});
renderer.domElement.addEventListener('mousemove', e => {
  if (!Editor.dragging) return;
  Editor.dragPoint((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
});
renderer.domElement.addEventListener('mouseup', () => { Editor.dragging = false; });
renderer.domElement.addEventListener('wheel', e => { Editor.changeDepth(-e.deltaY); });

document.getElementById('btn-play').onclick = () => Editor.startFlight();
document.getElementById('btn-stop').onclick = () => Editor.stopFlight();
document.getElementById('btn-clear').onclick = () => Editor.clear();
document.getElementById('btn-export').onclick = () => Editor.exportFrames();

// ── Carrega modelo
const loader = new THREE.OBJLoader();
loader.load('./uploads_files_2532780_Gamecock.obj', obj => {
  obj.traverse(c => { if (c.isMesh) c.material = material; });
  const box = new THREE.Box3().setFromObject(obj);
  const maxDim = Math.max(...box.getSize(new THREE.Vector3()).toArray());
  baseScale = 0.5 / maxDim;
  obj.scale.setScalar(baseScale);
  airplane = obj;
  scene.add(airplane);
});

function animate() {
  requestAnimationFrame(animate);
  Editor.updateFlight();
  renderer.render(scene, camera);
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
