<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
.card-opacity {
  width: 400px;
  height: 300px;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  background: white;
  font-family: sans-serif;
}

/* Camada 1: nuvem — ocupa a metade superior, fade de cima para baixo */
.img-nuvem {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 60%;
  background: url('./images/1/nuvem.jpeg') center/cover no-repeat;
  mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 0%,
    rgba(0,0,0,0.9) 35%,
    rgba(0,0,0,0.5) 55%,
    rgba(0,0,0,0.1) 75%,
    rgba(0,0,0,0) 100%
  );
  -webkit-mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 0%,
    rgba(0,0,0,0.9) 35%,
    rgba(0,0,0,0.5) 55%,
    rgba(0,0,0,0.1) 75%,
    rgba(0,0,0,0) 100%
  );
  z-index: 1;
}

/* Camada 2: avião — ocupa a metade superior, fade de cima para baixo igual à nuvem
   mas com mix-blend-mode para mesclar com ela */
.img-aviao {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 60%;
  background: url('./images/1/aviao.jpeg') center/cover no-repeat;
  mix-blend-mode: screen;
  mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 0%,
    rgba(0,0,0,0.9) 45%,
    rgba(0,0,0,0.8) 65%,
    rgba(0,0,0,0.5) 75%,
    rgba(0,0,0,0) 100%
  );
  -webkit-mask-image: linear-gradient(
    to bottom,
    rgba(0,0,0,1) 0%,
    rgba(0,0,0,0.9) 45%,
    rgba(0,0,0,0.8) 65%,
    rgba(0,0,0,0.5) 75%,
    rgba(0,0,0,0) 100%
  );
  z-index: 2;
}

/* Texto sobre a área das imagens */
.card-content {
  position: absolute;
  top: 0;
  width: 100%;
  height: 60%;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 16px;
  color: white;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  z-index: 10;
  box-sizing: border-box;
}

/* Área branca inferior — preservada como no original */
.card-footer {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40%;
  padding: 16px;
  box-sizing: border-box;
  color: #333;
  z-index: 10;
}
  </style>
</head>
<body>

<div class="card card-opacity">
  <div class="img-nuvem"></div>
  <div class="img-aviao"></div>

  <div class="card-content">
    <h2>Título Colorido</h2>
    <p>Texto sobre a parte das imagens</p>
  </div>
  <div class="card-footer">
    <p>Texto sobre a parte branca</p>
  </div>
</div>

</body>
</html>
