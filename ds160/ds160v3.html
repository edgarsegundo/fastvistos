<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DS-160 Nonimmigrant Visa Application</title>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; line-height: 1.5; background: #f5f5f5; color: #111; }

    #app { display: flex; flex-direction: column; height: 100%; max-width: 620px; margin: 0 auto; background: #fff; }

    /* ── Header ── */
    .header { padding: 0.6rem 1rem; background: #000; color: #fff; flex-shrink: 0; }
    .header h1 { font-size: 0.95rem; font-weight: 600; letter-spacing: 0.02em; }
    .header .appid { font-size: 0.75rem; color: #aaa; }

    /* ── Progress ── */
    .progress { padding: 0.55rem 1rem 0.45rem; border-bottom: 1px solid #ddd; flex-shrink: 0; background: #fafafa; }
    .progress-meta { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.8rem; color: #555; margin-bottom: 0.3rem; }
    .progress-meta strong { color: #000; }
    .progress-bar { height: 3px; background: #ddd; border-radius: 2px; }
    .progress-bar-fill { height: 100%; background: #000; border-radius: 2px; transition: width .35s ease; }

    /* ── Scroll area ── */
    #scroll-wrapper { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    #content { flex: 1; overflow-y: auto; padding: 1rem 1rem 2rem; -webkit-overflow-scrolling: touch; }
    #scroll-shadow { position: absolute; bottom: 0; left: 0; right: 0; height: 64px; background: linear-gradient(transparent, rgba(255,255,255,.92)); pointer-events: none; opacity: 0; transition: opacity .25s; }
    #scroll-shadow.visible { opacity: 1; }

    /* ── Page title ── */
    .page-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.2rem; }
    .page-note { font-size: 0.82rem; color: #555; margin-bottom: 1.1rem; background: #fffbe6; border-left: 3px solid #f0c040; padding: 0.45rem 0.65rem; border-radius: 2px; }

    /* ── Section heading ── */
    .section-heading { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #555; margin: 1.3rem 0 0.7rem; border-bottom: 1px solid #eee; padding-bottom: 0.3rem; }

    /* ── Fields ── */
    .field { margin-bottom: 1.15rem; }
    .field label { display: block; font-size: 0.87rem; font-weight: 600; margin-bottom: 0.3rem; }
    .field .req { color: #c0392b; margin-left: 2px; }
    .field .hint { font-size: 0.78rem; color: #666; margin-bottom: 0.3rem; display: block; }
    .field input[type="text"], .field input[type="number"],
    .field textarea, .field select {
      width: 100%; font-size: 0.92rem; padding: 0.55rem 0.6rem;
      border: 1px solid #bbb; border-radius: 4px; background: #fff;
      transition: border-color .15s;
    }
    .field input[type="text"]:focus, .field textarea:focus, .field select:focus { border-color: #000; outline: none; box-shadow: 0 0 0 2px rgba(0,0,0,.08); }
    .field input.err, .field select.err, .field textarea.err { border-color: #c0392b; }
    .field .err-msg { font-size: 0.78rem; color: #c0392b; margin-top: 0.2rem; }
    .field textarea { min-height: 72px; resize: vertical; }
    .field select { cursor: pointer; }

    /* ── Field group (inline row) ── */
    .field-row { display: flex; gap: 0.5rem; }
    .field-row .field { flex: 1; margin-bottom: 0; }
    .field-row .field.narrow { flex: 0 0 80px; }

    /* ── Radio / checkbox ── */
    .radio-group { display: flex; gap: 1rem; flex-wrap: wrap; }
    .radio-group label { display: flex; align-items: center; gap: 0.4rem; font-weight: normal; font-size: 0.9rem; cursor: pointer; }
    .radio-group input { width: 1.1rem; height: 1.1rem; cursor: pointer; flex-shrink: 0; }
    .check-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.4rem; }
    .check-row input { width: 1rem; height: 1rem; cursor: pointer; }
    .check-row label { font-size: 0.85rem; font-weight: normal; cursor: pointer; }

    /* ── Repeatable group ── */
    .repeatable { border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 1rem; overflow: hidden; }
    .repeatable-item { padding: 0.8rem; border-bottom: 1px solid #eee; position: relative; }
    .repeatable-item:last-child { border-bottom: none; }
    .repeatable-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    .repeatable-item-header span { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #777; }
    .btn-remove { background: none; border: 1px solid #ddd; border-radius: 4px; color: #888; font-size: 0.78rem; padding: 0.2rem 0.55rem; cursor: pointer; }
    .btn-remove:hover { background: #fef; border-color: #c0392b; color: #c0392b; }
    .repeatable-add { display: flex; justify-content: center; padding: 0.55rem; background: #f9f9f9; }
    .btn-add { background: none; border: 1px dashed #999; border-radius: 4px; font-size: 0.82rem; color: #444; padding: 0.3rem 1rem; cursor: pointer; }
    .btn-add:hover { border-color: #000; color: #000; background: #f0f0f0; }

    /* ── Children / conditional block ── */
    .children-block { margin-top: 0.6rem; padding: 0.7rem; background: #fafafa; border-left: 3px solid #ddd; border-radius: 0 4px 4px 0; }

    /* ── Nav ── */
    .nav { display: flex; gap: 0.6rem; padding: 0.7rem 1rem; border-top: 1px solid #ddd; background: #000; flex-shrink: 0; }
    .nav button { flex: 1; padding: 0.8rem; font-size: 0.95rem; cursor: pointer; border: 1px solid #555; background: #222; color: #fff; border-radius: 4px; font-weight: 500; transition: background .15s; }
    .nav button:hover { background: #444; }
    .nav button.primary { background: #fff; color: #000; border-color: #fff; }
    .nav button.primary:hover { background: #e8e8e8; }
    .nav button:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Validation summary ── */
    .val-summary { background: #fff0f0; border: 1px solid #f5c6c6; border-radius: 4px; padding: 0.6rem 0.8rem; margin-bottom: 0.8rem; font-size: 0.82rem; color: #a00; }
    .val-summary ul { margin: 0.3rem 0 0 1.1rem; }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body>
<div id="app" x-data="ds160App()" x-cloak>

  <!-- Header -->
  <div class="header">
    <h1>DS-160 — Online Nonimmigrant Visa Application</h1>
    <div class="appid">Electronic Application Center · U.S. Department of State</div>
  </div>

  <!-- Progress -->
  <div class="progress">
    <div class="progress-meta">
      <span>Page <strong x-text="pageIndex + 1"></strong> of <strong x-text="pages.length"></strong>: <strong x-text="pages[pageIndex].title"></strong></span>
      <span x-text="Math.round(((pageIndex + 1) / pages.length) * 100) + '%'"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-bar-fill" :style="`width:${((pageIndex + 1) / pages.length) * 100}%`"></div>
    </div>
  </div>

  <!-- Scroll area -->
  <div id="scroll-wrapper">
    <div id="content">

      <!-- Validation summary -->
      <div class="val-summary" x-show="errors.length > 0" x-cloak>
        Please correct all areas in error before continuing.
        <ul>
          <template x-for="e in errors" :key="e"><li x-text="e"></li></template>
        </ul>
      </div>

      <!-- Pages -->
      <template x-for="(page, pi) in pages" :key="page.id">
        <div x-show="pageIndex === pi">
          <div class="page-title" x-text="page.title"></div>
          <div class="page-note" x-show="page.note" x-text="page.note"></div>

          <!-- Render page nodes via pageRenderer component -->
          <div x-data="pageRenderer(page)">
            <div class="nodes-container"></div>
          </div>
        </div>
      </template>

    </div>
    <div id="scroll-shadow"></div>
  </div>

  <!-- Navigation -->
  <div class="nav">
    <button type="button" @click="prevPage()" :disabled="pageIndex === 0">← Back</button>
    <button type="button" class="primary"
            @click="pageIndex < pages.length - 1 ? nextPage() : submit()"
            x-text="pageIndex < pages.length - 1 ? 'Next →' : 'Submit'"></button>
  </div>

</div>

// Shared helpers
function countriesOptions(placeholder='- Select One -') {
  return `<option value="">${placeholder}</option>` +
    COUNTRIES.map(c=>`<option value="${c.v}">${c.l}</option>`).join('');
}

const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const DAYS = Array.from({length:31},(_,i)=>String(i+1).padStart(2,'0'));

function monthOptions(blank='') {
  return `<option value="">${blank}</option>` +
    MONTHS.map(m=>`<option value="${m}">${m}</option>`).join('');
}
function dayOptions(blank='') {
  return `<option value="">${blank}</option>` +
    DAYS.map(d=>`<option value="${d}">${d}</option>`).join('');
}

// ═══════════════════════════════════════════════════════════════════════
// GENERIC NODE RENDERER  (pure HTML string, no Alpine templates inside)
// ═══════════════════════════════════════════════════════════════════════
// Because Alpine x-html can't use Alpine directives inside, we build
// actual DOM elements using x-data + $watch on each rendered node.

// Main app component
function ds160App() {
  return {
    pages: buildPages(),
    pageIndex: 0,
    errors: [],

    get store() { return STORE; },

    prevPage() {
      if (this.pageIndex > 0) {
        this.pageIndex--;
        this.errors = [];
        scrollToTop();
      }
    },

    nextPage() {
      this.errors = this.validatePage(this.pages[this.pageIndex]);
      if (this.errors.length > 0) {
        scrollToTop();
        return;
      }
      this.pageIndex++;
      scrollToTop();
    },

    submit() {
      this.errors = this.validatePage(this.pages[this.pageIndex]);
      if (this.errors.length > 0) { scrollToTop(); return; }
      alert('DS-160 data collected successfully!\n\nIn a production implementation, this would be submitted to the server.\n\nTotal fields captured: ' + Object.keys(STORE.data).length);
    },

    validatePage(page) {
      const errs = [];
      for (const node of page.nodes || []) {
        if (node.required && node.id && !STORE.data[node.id]) {
          errs.push(`"${node.label}" is required.`);
        }
        // Date triples
        if (node.type === 'date3' && node.required) {
          if (!STORE.data[node.id_year]) errs.push(`"${node.label}" year is required.`);
        }
      }
      return errs;
    }
  };
}

function scrollToTop() {
  const el = document.getElementById('content');
  if (el) el.scrollTop = 0;
  setTimeout(() => updateShadow(el), 80);
}

// ── Individual node Alpine component ─────────────────────────────────
// Each node is a self-contained Alpine x-data component so it can react
// to STORE changes without needing x-for inside x-html.

// We render each node as an Alpine-aware div with x-data on it.
// This is injected into the template via x-html on a wrapper.

function makeNodeEl(node, groupId, itemIdx) {
  // groupId / itemIdx are for rendering fields inside repeatable groups
  const inGroup = groupId != null;

  const fieldKey = (id) => {
    if (inGroup) return null; // handled inside group component
    return id;
  };

  switch(node.type) {

    case 'section':
      return `<div class="section-heading">${node.label}</div>`;

    case 'text':
      return makeTextField(node, inGroup, groupId, itemIdx);

    case 'textarea':
      return makeTextareaField(node, inGroup, groupId, itemIdx);

    case 'select':
      return makeSelectField(node, inGroup, groupId, itemIdx);

    case 'country':
      return makeCountryField(node, inGroup, groupId, itemIdx);

    case 'radio':
      return makeRadioField(node, inGroup, groupId, itemIdx);

    case 'date3':
      return makeDateField(node, inGroup, groupId, itemIdx);

    case 'month_year':
      return makeMonthYearField(node, inGroup, groupId, itemIdx);

    case 'repeatable':
      return makeRepeatableGroup(node);

    default:
      return '';
  }
}

// ── Helper: build x-model binding ─────────────────────────────────────
function xmodel(id, inGroup, groupId, itemIdx) {
  if (inGroup) {
    return `x-model="STORE.lists['${groupId}'][${itemIdx}]['${id}']"`;
  }
  return `x-model="STORE.data['${id}']"`;
}

function ensureInit(id, inGroup, groupId, itemIdx) {
  if (inGroup) {
    return `x-init="if(!STORE.lists['${groupId}'][${itemIdx}]) STORE.lists['${groupId}'][${itemIdx}] = {};"`;
  }
  return '';
}

// ── Text field ────────────────────────────────────────────────────────
function makeTextField(node, inGroup, groupId, itemIdx) {
  const req = node.required ? '<span class="req">*</span>' : '';
  const hint = node.hint ? `<span class="hint">${node.hint}</span>` : '';
  const xm = xmodel(node.id, inGroup, groupId, itemIdx);
  const naBlock = node.na ? `
    <div class="check-row">
      <input type="checkbox" id="na_${node.na.id}" @change="
        if($event.target.checked) { ${inGroup ? `STORE.lists['${groupId}'][${itemIdx}]['${node.id}']='N/A'` : `STORE.data['${node.id}']='N/A'`}; $el.previousElementSibling.querySelector('input').disabled=true; }
        else { ${inGroup ? `STORE.lists['${groupId}'][${itemIdx}]['${node.id}']=''` : `STORE.data['${node.id}']= ''`}; $el.previousElementSibling.querySelector('input').disabled=false; }
      " />
      <label for="na_${node.na.id}">${node.na.label}</label>
    </div>` : '';
  return `<div class="field">
    <label>${node.label}${req}</label>${hint}
    <input type="text" ${xm} maxlength="${node.max_length||100}" />
    ${naBlock}
  </div>`;
}

// ── Textarea ─────────────────────────────────────────────────────────
function makeTextareaField(node, inGroup, groupId, itemIdx) {
  const req = node.required ? '<span class="req">*</span>' : '';
  const xm = xmodel(node.id, inGroup, groupId, itemIdx);
  return `<div class="field">
    <label>${node.label}${req}</label>
    <textarea ${xm} maxlength="${node.max_length||4000}"></textarea>
  </div>`;
}

// ── Select ────────────────────────────────────────────────────────────
function makeSelectField(node, inGroup, groupId, itemIdx) {
  const req = node.required ? '<span class="req">*</span>' : '';
  const hint = node.hint ? `<span class="hint">${node.hint}</span>` : '';
  const xm = xmodel(node.id, inGroup, groupId, itemIdx);
  const opts = (node.options||[]).map(o=>`<option value="${o.v}">${o.l}</option>`).join('');
  const ph = node.placeholder ? `<option value="">${node.placeholder}</option>` : '';
  return `<div class="field">
    <label>${node.label}${req}</label>${hint}
    <select ${xm}>${ph}${opts}</select>
  </div>`;
}

// ── Country select ────────────────────────────────────────────────────
function makeCountryField(node, inGroup, groupId, itemIdx) {
  const req = node.required ? '<span class="req">*</span>' : '';
  const xm = xmodel(node.id, inGroup, groupId, itemIdx);
  return `<div class="field">
    <label>${node.label}${req}</label>
    <select ${xm}>${countriesOptions()}</select>
  </div>`;
}

// ── Radio with conditional children ───────────────────────────────────
function makeRadioField(node, inGroup, groupId, itemIdx) {
  if (!node.options || node.options.length === 0) return '';
  const req = node.required ? '<span class="req">*</span>' : '';
  const help = node.help ? `<span class="hint">${node.help}</span>` : '';
  const xm_key = inGroup ? `STORE.lists['${groupId}'][${itemIdx}]['${node.id}']` : `STORE.data['${node.id}']`;

  const radios = node.options.map(o => `
    <label>
      <input type="radio" name="${inGroup ? groupId+'_'+itemIdx+'_'+node.id : node.id}"
             value="${o.v}"
             @change="${xm_key} = '${o.v}'" 
             :checked="${xm_key} === '${o.v}'" />
      ${o.l}
    </label>`).join('');

  // Children blocks for each value
  const childrenBlocks = Object.entries(node.children || {}).map(([val, children]) => {
    if (!children || children.length === 0) return '';
    const childHtml = children.map(c => makeNodeEl(c, inGroup ? groupId : null, inGroup ? itemIdx : null)).join('');
    return `<div class="children-block" x-show="${xm_key} === '${val}'">${childHtml}</div>`;
  }).join('');

  return `<div class="field" x-data="{}">
    <label>${node.label}${req}</label>${help}
    <div class="radio-group">${radios}</div>
    ${childrenBlocks}
  </div>`;
}

// ── Date triple (day/month/year) ───────────────────────────────────────
function makeDateField(node, inGroup, groupId, itemIdx) {
  const req = node.required ? '<span class="req">*</span>' : '';
  const xmDay = xmodel(node.id_day, inGroup, groupId, itemIdx);
  const xmMon = xmodel(node.id_month, inGroup, groupId, itemIdx);
  const xmYr  = xmodel(node.id_year, inGroup, groupId, itemIdx);
  const naBlock = node.na ? `
    <div class="check-row">
      <input type="checkbox" id="na_${node.na.id}" @change="
        STORE.data['${node.na.id}'] = $event.target.checked ? 'Y' : ''
      "/>
      <label for="na_${node.na.id}">${node.na.label}</label>
    </div>` : '';
  return `<div class="field">
    <label>${node.label}${req}</label>
    <div class="field-row">
      <div class="field narrow">
        <label style="font-weight:normal;font-size:.8rem;">Day</label>
        <select ${xmDay}>${dayOptions()}</select>
      </div>
      <div class="field">
        <label style="font-weight:normal;font-size:.8rem;">Month</label>
        <select ${xmMon}>${monthOptions()}</select>
      </div>
      <div class="field narrow">
        <label style="font-weight:normal;font-size:.8rem;">Year</label>
        <input type="text" ${xmYr} maxlength="4" placeholder="YYYY" />
      </div>
    </div>
    ${naBlock}
  </div>`;
}

// ── Month/Year pair ────────────────────────────────────────────────────
function makeMonthYearField(node, inGroup, groupId, itemIdx) {
  const xmMon = xmodel(node.id_month, inGroup, groupId, itemIdx);
  const xmYr  = xmodel(node.id_year, inGroup, groupId, itemIdx);
  return `<div class="field">
    <label style="font-size:.85rem;">${node.label}</label>
    <div class="field-row">
      <div class="field">
        <select ${xmMon}>${monthOptions()}</select>
      </div>
      <div class="field narrow">
        <input type="text" ${xmYr} maxlength="4" placeholder="YYYY" />
      </div>
    </div>
  </div>`;
}

// ── Repeatable group ───────────────────────────────────────────────────
function makeRepeatableGroup(node) {
  // Initialize list if not already
  if (!STORE.lists[node.id]) STORE.lists[node.id] = [{}];

  // Build template with x-data and x-for using the store directly
  const fieldsForItem = (idxExpr) => {
    return (node.fields || []).map(f => {
      // For repeatable items we build bindings dynamically using index
      return makeNodeEl(f, true, node.id, idxExpr);
    }).join('');
  };

  // Since x-html doesn't support Alpine directives, we use a custom
  // approach: render items statically for indices 0..max, and show/hide
  // based on list length. We support up to 10 items.
  const MAX = 10;
  const items = Array.from({length:MAX}, (_,i) => {
    const fields = (node.fields || []).map(f => makeNodeEl(f, true, node.id, i)).join('');
    return `
      <div class="repeatable-item" x-show="(STORE.lists['${node.id}'] || []).length > ${i}">
        <div class="repeatable-item-header">
          <span>${node.label} #${i+1}</span>
          <button class="btn-remove" type="button" @click="removeRepeatItem('${node.id}', ${i})"
                  x-show="${i} > 0 || (STORE.lists['${node.id}'] || []).length > 1">Remove</button>
        </div>
        ${fields}
      </div>`;
  }).join('');

  return `<div class="field" x-data="{
    removeRepeatItem(id, idx) {
      if(STORE.lists[id] && STORE.lists[id].length > 1) STORE.lists[id].splice(idx, 1);
    }
  }">
    <div class="repeatable">
      ${items}
      <div class="repeatable-add">
        <button class="btn-add" type="button" @click="
          if(!STORE.lists['${node.id}']) STORE.lists['${node.id}'] = [{}];
          if(STORE.lists['${node.id}'].length < ${MAX}) STORE.lists['${node.id}'].push({});
        ">+ Add Another</button>
      </div>
    </div>
  </div>`;
}

    </div>
    <div class="field" x-data="{}" x-show="STORE.data['present_occupation'] === 'S'">
      <div class="children-block">
        <div class="section-heading">School / Educational Institution</div>
        <div class="field"><label>Name of Institution</label><input type="text" x-model="STORE.data['school_name']" /></div>
        <div class="field"><label>Street Address (Line 1)</label><input type="text" x-model="STORE.data['school_street1']" /></div>
        <div class="field"><label>City</label><input type="text" x-model="STORE.data['school_city']" /></div>
        <div class="field"><label>State/Province</label><input type="text" x-model="STORE.data['school_state']" /></div>
        <div class="field"><label>Postal Zone / ZIP</label><input type="text" x-model="STORE.data['school_postal']" /></div>
        <div class="field"><label>Country/Region</label><select x-model="STORE.data['school_country']">${countriesOptions()}</select></div>
        <div class="field"><label>Telephone Number</label><input type="text" x-model="STORE.data['school_phone']" /></div>
        <div class="field"><label>Course of Study</label><input type="text" x-model="STORE.data['school_course']" /></div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════
// Minimal Alpine component for each PAGE that renders its own nodes
// ═══════════════════════════════════════════════════════════════════════
// We register a global function that each page div can call via x-init

window.STORE = STORE; // expose globally for x-data expressions

// Alpine.js magic: each page div uses x-data="{}" and renders nodes
// via DOM insertion in x-init. This avoids the x-html + Alpine directives
// incompatibility by using innerHTML with proper Alpine attribute parsing.

// We'll use a simpler approach: generate the nodes as static HTML
// with Alpine x-model/x-show attributes, then inject into a container div.
// Alpine will parse these when they're inserted via innerHTML if we use
// Alpine.$nextTick properly. Actually the cleanest approach for this
// use-case is to pre-render everything and let Alpine pick it up.

// Since the form is inside a single Alpine tree (ds160App), all x-model,
// x-show etc. on the injected HTML will be parsed by Alpine on init.
// We need to use Alpine.initTree() for dynamically added content.

function renderPageNodes(page) {
  if (!page || !page.nodes) return '';
  let html = '';
  for (const node of page.nodes) {
    if (node.type === 'radio' && node.note === 'employer_block') {
      html += makeOccupationBlock();
    } else {
      html += makeNodeEl(node, false, null, null);
    }
  }
  return html;
}

// ═══════════════════════════════════════════════════════════════════════
// Alpine component: per-page renderer
// ═══════════════════════════════════════════════════════════════════════
document.addEventListener('alpine:init', () => {
  // Initialize STORE with Alpine reactivity now that Alpine is available
  STORE = Alpine.reactive({ data: {}, lists: {} });

  Alpine.data('pageRenderer', (page) => ({
    html: '',
    init() {
      this.html = renderPageNodes(page);
      this.$nextTick(() => {
        const container = this.$el.querySelector('.nodes-container');
        if (container) {
          container.innerHTML = this.html;
          Alpine.initTree(container);
        }
      });
    }
  }));
});

// Scroll shadow
function updateShadow(el) {
  const shadow = document.getElementById('scroll-shadow');
  if (!el || !shadow) return;
  shadow.classList.toggle('visible', el.scrollTop + el.clientHeight < el.scrollHeight - 4);
}

document.addEventListener('DOMContentLoaded', () => {
  const content = document.getElementById('content');
  if (!content) return;
  content.addEventListener('scroll', () => updateShadow(content));
  setTimeout(() => updateShadow(content), 400);
});
</script>
