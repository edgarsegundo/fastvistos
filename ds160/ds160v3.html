<script>
// ── DS-160 Alpine helper functions ──────────────────────────────────
// All imperative logic lives here so Alpine attribute expressions
// remain single function-call expressions (Alpine's strict requirement).

// Toggle "N/A" on a text field via a checkbox
function dsNaToggle(event, getter, setter) {
  if (event.target.checked) {
    setter('N/A');
    var inp = event.target.closest('.field').querySelector('input[type=text]');
    if (inp) inp.disabled = true;
  } else {
    setter('');
    var inp = event.target.closest('.field').querySelector('input[type=text]');
    if (inp) inp.disabled = false;
  }
}

// Initialise a repeatable list: ensure STORE.lists[id] has MAX empty slots
// and STORE.data[countKey] tracks how many are visible.
function dsRepeatInit(listId, countKey, max) {
  if (!STORE.data[countKey]) STORE.data[countKey] = 1;
  if (!STORE.lists[listId]) STORE.lists[listId] = [];
  while (STORE.lists[listId].length < max) STORE.lists[listId].push({});
}

// Add one more visible row (up to max)
function dsRepeatAdd(listId, countKey, max) {
  var c = STORE.data[countKey] || 1;
  if (c < max) STORE.data[countKey] = c + 1;
}

// Remove row at idx: splice data, push empty to keep length==MAX, decrement count
function dsRepeatRemove(listId, countKey, idx) {
  var c = STORE.data[countKey] || 1;
  if (c > 1) {
    STORE.lists[listId].splice(idx, 1);
    STORE.lists[listId].push({});
    STORE.data[countKey] = c - 1;
  }
}
</script>

<div id="app" x-data="ds160App()" x-cloak>

  <div class="header">
    <h1>DS-160 — Online Nonimmigrant Visa Application</h1>
    <div class="appid">Electronic Application Center · U.S. Department of State</div>
  </div>

  <div class="progress">
    <div class="progress-meta">
      <span>Page <strong x-text="pageIndex + 1"></strong> of <strong x-text="pages.length"></strong>: <strong x-text="pages[pageIndex].title"></strong></span>
      <span x-text="Math.round(((pageIndex + 1) / pages.length) * 100) + '%'"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-bar-fill" :style="`width:${((pageIndex + 1) / pages.length) * 100}%`"></div>
    </div>
  </div>

  <div id="scroll-wrapper">
    <div id="content">

      <div class="val-summary" x-show="errors.length > 0" x-cloak>
        Please correct all areas in error before continuing.
        <ul>
          <template x-for="e in errors" :key="e"><li x-text="e"></li></template>
        </ul>
      </div>

      <template x-for="(page, pi) in pages" :key="page.id">
        <div x-show="pageIndex === pi">
          <div class="page-title" x-text="page.title"></div>
          <div class="page-note" x-show="page.note" x-text="page.note"></div>
          <div x-data="pageRenderer(page)">
            <div class="nodes-container"></div>
          </div>
        </div>
      </template>

    </div>
    <div id="scroll-shadow"></div>
  </div>

  <div class="nav">
    <button type="button" @click="prevPage()" :disabled="pageIndex === 0">← Back</button>
    <button type="button" class="primary"
            @click="pageIndex < pages.length - 1 ? nextPage() : submit()"
            x-text="pageIndex < pages.length - 1 ? 'Next →' : 'Submit'"></button>
  </div>

</div>

// ═══════════════════════════════════════════════════════════════════════
// NODE RENDERERS
// ═══════════════════════════════════════════════════════════════════════

// FIX: All x-show expressions use STORE.lists['id'] with bracket notation
// instead of bare variable names like military_service_entries

function makeNodeEl(node, inGroup, groupId, itemIdx) {
  switch(node.type) {
    case 'section':     return `<div class="section-heading">${node.label}</div>`;
    case 'text':        return makeTextField(node, inGroup, groupId, itemIdx);
    case 'textarea':    return makeTextareaField(node, inGroup, groupId, itemIdx);
    case 'select':      return makeSelectField(node, inGroup, groupId, itemIdx);
    case 'country':     return makeCountryField(node, inGroup, groupId, itemIdx);
    case 'radio':       return makeRadioField(node, inGroup, groupId, itemIdx);
    case 'date3':       return makeDateField(node, inGroup, groupId, itemIdx);
    case 'month_year':  return makeMonthYearField(node, inGroup, groupId, itemIdx);
    case 'repeatable':  return makeRepeatableGroup(node);
    case 'occupation_block': return makeOccupationBlock();
    default: return '';
  }
}

function xmodel(id, inGroup, groupId, itemIdx) {
  if (inGroup) return `x-model="STORE.lists['${groupId}'][${itemIdx}]['${id}']"`;
  return `x-model="STORE.data['${id}']"`;
}

function makeTextField(node, inGroup, groupId, itemIdx) {
  const req = node.required ? '<span class="req">*</span>' : '';
  const hint = node.hint ? `<span class="hint">${node.hint}</span>` : '';
  const xm = xmodel(node.id, inGroup, groupId, itemIdx);
  const inputRef = inGroup
    ? `STORE.lists['${groupId}'][${itemIdx}]['${node.id}']`
    : `STORE.data['${node.id}']`;
  const naBlock = node.na ? `
    <div class="check-row">
      <input type="checkbox" id="na_${node.na.id}_${inGroup ? groupId+'_'+itemIdx : 'top'}"
        @change="dsNaToggle($event, () => ${inputRef}, v => { ${inputRef} = v; })" />
      <label for="na_${node.na.id}_${inGroup ? groupId+'_'+itemIdx : 'top'}">${node.na.label}</label>
    </div>` : '';
  return `<div class="field">
    <label>${node.label}${req}</label>${hint}
    <input type="text" ${xm} maxlength="${node.max_length||100}" />
    ${naBlock}
  </div>`;
}

function makeTextareaField(node, inGroup, groupId, itemIdx) {
  const req = node.required ? '<span class="req">*</span>' : '';
  const xm = xmodel(node.id, inGroup, groupId, itemIdx);
  return `<div class="field">
    <label>${node.label}${req}</label>
    <textarea ${xm} maxlength="${node.max_length||4000}"></textarea>
  </div>`;
}

function makeSelectField(node, inGroup, groupId, itemIdx) {
  const req = node.required ? '<span class="req">*</span>' : '';
  const hint = node.hint ? `<span class="hint">${node.hint}</span>` : '';
  const xm = xmodel(node.id, inGroup, groupId, itemIdx);
  const opts = (node.options||[]).map(o=>`<option value="${o.v}">${o.l}</option>`).join('');
  const ph = node.placeholder ? `<option value="">${node.placeholder}</option>` : '';
  return `<div class="field">
    <label>${node.label}${req}</label>${hint}
    <select ${xm}>${ph}${opts}</select>
  </div>`;
}

function makeCountryField(node, inGroup, groupId, itemIdx) {
  const req = node.required ? '<span class="req">*</span>' : '';
  const xm = xmodel(node.id, inGroup, groupId, itemIdx);
  return `<div class="field">
    <label>${node.label}${req}</label>
    <select ${xm}>${countriesOptions()}</select>
  </div>`;
}

function makeRadioField(node, inGroup, groupId, itemIdx) {
  if (!node.options || node.options.length === 0) return '';
  const req = node.required ? '<span class="req">*</span>' : '';
  const help = node.help ? `<span class="hint">${node.help}</span>` : '';
  // Slots are always pre-filled with {} by makeRepeatableGroup x-init,
  // so we can use direct bracket notation safely.
  const xm_key = inGroup
    ? `STORE.lists['${groupId}'][${itemIdx}]['${node.id}']`
    : `STORE.data['${node.id}']`;
  const xm_set = xm_key;

  const radioName = inGroup
    ? `${groupId}_${itemIdx}_${node.id}`
    : node.id;

  const radios = node.options.map(o => `
    <label>
      <input type="radio" name="${radioName}" value="${o.v}"
             @change="${xm_set} = '${o.v}'"
             :checked="${xm_key} === '${o.v}'" />
      ${o.l}
    </label>`).join('');

  // FIX: x-show uses the same safe bracket notation
  const childrenBlocks = Object.entries(node.children || {}).map(([val, children]) => {
    if (!children || children.length === 0) return '';
    const childHtml = children.map(c => makeNodeEl(c, inGroup, groupId, itemIdx)).join('');
    return `<div class="children-block" x-show="${xm_key} === '${val}'">${childHtml}</div>`;
  }).join('');

  return `<div class="field">
    <label>${node.label}${req}</label>${help}
    <div class="radio-group">${radios}</div>
    ${childrenBlocks}
  </div>`;
}

function makeDateField(node, inGroup, groupId, itemIdx) {
  const req = node.required ? '<span class="req">*</span>' : '';
  const xmDay = xmodel(node.id_day, inGroup, groupId, itemIdx);
  const xmMon = xmodel(node.id_month, inGroup, groupId, itemIdx);
  const xmYr  = xmodel(node.id_year, inGroup, groupId, itemIdx);
  const naId = node.na ? `na_${node.na.id}` : '';
  const naBlock = node.na ? `
    <div class="check-row">
      <input type="checkbox" id="${naId}" @change="STORE.data['${node.na.id}'] = $event.target.checked ? 'Y' : ''" />
      <label for="${naId}">${node.na.label}</label>
    </div>` : '';
  return `<div class="field">
    <label>${node.label}${req}</label>
    <div class="field-row">
      <div class="field narrow">
        <label style="font-weight:normal;font-size:.8rem;">Day</label>
        <select ${xmDay}>${dayOptions()}</select>
      </div>
      <div class="field">
        <label style="font-weight:normal;font-size:.8rem;">Month</label>
        <select ${xmMon}>${monthOptions()}</select>
      </div>
      <div class="field narrow">
        <label style="font-weight:normal;font-size:.8rem;">Year</label>
        <input type="text" ${xmYr} maxlength="4" placeholder="YYYY" />
      </div>
    </div>
    ${naBlock}
  </div>`;
}

function makeMonthYearField(node, inGroup, groupId, itemIdx) {
  const xmMon = xmodel(node.id_month, inGroup, groupId, itemIdx);
  const xmYr  = xmodel(node.id_year, inGroup, groupId, itemIdx);
  return `<div class="field">
    <label style="font-size:.85rem;">${node.label}</label>
    <div class="field-row">
      <div class="field">
        <select ${xmMon}>${monthOptions()}</select>
      </div>
      <div class="field narrow">
        <input type="text" ${xmYr} maxlength="4" placeholder="YYYY" />
      </div>
    </div>
  </div>`;
}

// FIX: makeRepeatableGroup — do NOT access STORE.lists here (STORE may not be reactive yet).
// Instead, initialize lazily in x-init, and use STORE.lists['id'] in x-show (bracket notation).
function makeRepeatableGroup(node) {
  const listId = node.id;
  const MAX = 10;

  // We pre-fill ALL 10 slots with {} in x-init so x-model="STORE.lists['id'][i]['field']"
  // never hits undefined[field] — even for hidden rows.
  // We track how many are "active" (visible) with a separate _count key on STORE.data.
  const countKey = '__count_' + listId;

  const items = Array.from({length: MAX}, (_, i) => {
    const fields = (node.fields || []).map(f => makeNodeEl(f, true, listId, i)).join('');
    return `
      <div class="repeatable-item" x-show="(STORE.data['${countKey}'] || 1) > ${i}">
        <div class="repeatable-item-header">
          <span>${node.label} #${i+1}</span>
          <button class="btn-remove" type="button"
            x-show="${i} > 0 || (STORE.data['${countKey}'] || 1) > 1"
            @click="dsRepeatRemove('${listId}', '${countKey}', ${i})">Remove</button>
        </div>
        ${fields}
      </div>`;
  }).join('');

  return `<div class="field"
    x-init="dsRepeatInit('${listId}', '${countKey}', ${MAX})">
    <div class="repeatable">
      ${items}
      <div class="repeatable-add">
        <button class="btn-add" type="button"
          @click="dsRepeatAdd('${listId}', '${countKey}', ${MAX})">
          + Add Another
        </button>
      </div>
    </div>
  </div>`;
}

function renderPageNodes(page) {
  if (!page || !page.nodes) return '';
  return page.nodes.map(node => makeNodeEl(node, false, null, null)).join('');
}

// ═══════════════════════════════════════════════════════════════════════
// MAIN APP + ALPINE INIT
// ═══════════════════════════════════════════════════════════════════════
function ds160App() {
  return {
    pages: buildPages(),
    pageIndex: 0,
    errors: [],

    prevPage() {
      if (this.pageIndex > 0) { this.pageIndex--; this.errors = []; scrollToTop(); }
    },
    nextPage() {
      this.errors = this.validatePage(this.pages[this.pageIndex]);
      if (this.errors.length > 0) { scrollToTop(); return; }
      this.pageIndex++;
      scrollToTop();
    },
    submit() {
      this.errors = this.validatePage(this.pages[this.pageIndex]);
      if (this.errors.length > 0) { scrollToTop(); return; }
      alert('DS-160 data collected successfully!\n\nTotal fields captured: ' + Object.keys(STORE.data).length);
    },
    validatePage(page) {
      const errs = [];
      for (const node of page.nodes || []) {
        if (node.required && node.id && !STORE.data[node.id]) {
          errs.push(`"${node.label}" is required.`);
        }
        if (node.type === 'date3' && node.required) {
          if (!STORE.data[node.id_year]) errs.push(`"${node.label}" year is required.`);
        }
      }
      return errs;
    }
  };
}

function scrollToTop() {
  const el = document.getElementById('content');
  if (el) el.scrollTop = 0;
  setTimeout(() => updateShadow(el), 80);
}

// FIX: alpine:init — make STORE reactive BEFORE any component accesses it,
// and expose it on window so inline Alpine expressions can reach it.
document.addEventListener('alpine:init', () => {
  STORE = Alpine.reactive({ data: {}, lists: {} });
  window.STORE = STORE;

  Alpine.data('pageRenderer', (page) => ({
    init() {
      const html = renderPageNodes(page);
      this.$nextTick(() => {
        const container = this.$el.querySelector('.nodes-container');
        if (container) {
          container.innerHTML = html;
          Alpine.initTree(container);
        }
      });
    }
  }));
});

function updateShadow(el) {
  const shadow = document.getElementById('scroll-shadow');
  if (!el || !shadow) return;
  shadow.classList.toggle('visible', el.scrollTop + el.clientHeight < el.scrollHeight - 4);
}

document.addEventListener('DOMContentLoaded', () => {
  const content = document.getElementById('content');
  if (content) {
    content.addEventListener('scroll', () => updateShadow(content));
    setTimeout(() => updateShadow(content), 400);
  }
});
</script>
