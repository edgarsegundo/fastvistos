<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rascunho DS-160</title>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: sans-serif;
      font-size: 16px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }

    #conteudo {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 0.5rem;
      -webkit-overflow-scrolling: touch;
    }

    .campo {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }

    label { font-weight: bold; }
    .hint { font-size: 0.85rem; color: #555; }
    .obrigatorio { color: red; }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      font-size: 1rem;
      padding: 0.6rem 0.5rem;
      border: 1px solid #999;
      border-radius: 4px;
    }

    textarea { min-height: 80px; resize: vertical; }

    .opcoes { display: flex; flex-direction: column; gap: 0.6rem; }
    .opcoes label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: normal;
      cursor: pointer;
      padding: 0.4rem 0;
    }
    .opcoes input { width: 1.2rem; height: 1.2rem; flex-shrink: 0; }

    .secao {
      padding-top: 0.1rem;
      margin-top: 0.1rem;
    }
    .secao h2 { font-size: 1.1rem; margin-bottom: 0.3rem; }
    .secao .descricao { font-size: 0.85rem; color: #444; margin-bottom: 1rem; }

    .progresso {
      padding: 0.75rem 1rem 0.5rem;
      font-size: 0.85rem;
      color: #444;
      border-bottom: 2px solid #000;
      flex-shrink: 0;
    }
    .progresso-barra {
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin-top: 0.4rem;
    }
    .progresso-barra-inner {
      height: 100%;
      background: #000;
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* Wrapper relativo para a sombra ficar posicionada corretamente */
    #conteudo-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Sombra de scroll — aparece quando há conteúdo abaixo */
    #scroll-sombra {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.95));
      pointer-events: none; /* não bloqueia cliques */
      transition: opacity 0.3s;
      opacity: 0;
    }
    #scroll-sombra.visivel {
      opacity: 1;
    }

    .nav {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid #ddd;
      background: #000;
      flex-shrink: 0;
    }
    .nav button {
      flex: 1;
      padding: 0.85rem;
      font-size: 1rem;
      cursor: pointer;
      border: 1px solid #fff;
      background: #000;
      color: #fff;
      border-radius: 4px;
    }
    .nav button[type="submit"] { background: #000; color: #fff; }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body>

<div id="app" x-data="formulario()" x-cloak>

  <!-- TOPO: barra de progresso — não rola -->
  <div class="progresso">
    Seção <span x-text="secaoAtual + 1"></span> de <span x-text="secoesVisiveis().length"></span>:
    <strong x-text="secoesVisiveis()[secaoAtual]?.titulo"></strong>
    <div class="progresso-barra">
      <div class="progresso-barra-inner"
           :style="`width: ${((secaoAtual + 1) / secoesVisiveis().length) * 100}%`"></div>
    </div>
  </div>

  <!-- Wrapper com posição relativa para a sombra -->
  <div id="conteudo-wrapper">

    <!-- MEIO: área rolável com os campos -->
    <div id="conteudo">
      <template x-for="(secao, idx) in secoesVisiveis()" :key="secao.id">
        <div x-show="secaoAtual === idx">

          <div class="secao">
            <h2 x-text="secao.titulo"></h2>
            <p class="descricao" x-text="secao.descricao" x-show="secao.descricao"></p>
          </div>

          <template x-for="campo in secao.campos" :key="campo.id">
            <div class="campo" x-show="avaliaCondicao(campo.condicao)">

              <label :for="campo.id">
                <span x-text="campo.label"></span>
                <span class="obrigatorio" x-show="campo.obrigatorio"> *</span>
              </label>

              <span class="hint" x-show="campo.hint" x-text="campo.hint"></span>

              <template x-if="campo.tipo === 'text'">
                <input type="text" :id="campo.id" :name="campo.id"
                       x-model="respostas[campo.id]"
                       @blur="aoSairDoCampo(campo.id)" />
              </template>

              <template x-if="campo.tipo === 'email'">
                <input type="email" :id="campo.id" :name="campo.id"
                       x-model="respostas[campo.id]"
                       @blur="aoSairDoCampo(campo.id)" />
              </template>

              <template x-if="campo.tipo === 'tel'">
                <input type="tel" :id="campo.id" :name="campo.id"
                       x-model="respostas[campo.id]"
                       @blur="aoSairDoCampo(campo.id)" />
              </template>

              <template x-if="campo.tipo === 'date'">
                <input type="date" :id="campo.id" :name="campo.id"
                       x-model="respostas[campo.id]"
                       @blur="aoSairDoCampo(campo.id)" />
              </template>

              <template x-if="campo.tipo === 'textarea'">
                <textarea :id="campo.id" :name="campo.id"
                          x-model="respostas[campo.id]"
                          @blur="aoSairDoCampo(campo.id)"></textarea>
              </template>

              <template x-if="campo.tipo === 'radio'">
                <div class="opcoes">
                  <template x-for="opcao in campo.opcoes" :key="opcao.valor">
                    <label>
                      <input type="radio" :name="campo.id" :value="opcao.valor"
                             x-model="respostas[campo.id]"
                             @change="aoSairDoCampo(campo.id)" />
                      <span x-text="opcao.label"></span>
                    </label>
                  </template>
                </div>
              </template>

              <template x-if="campo.tipo === 'select'">
                <select :id="campo.id" :name="campo.id"
                        x-model="respostas[campo.id]"
                        @change="aoSairDoCampo(campo.id)">
                  <option value="">Selecione...</option>
                  <template x-for="opcao in campo.opcoes" :key="opcao.valor">
                    <option :value="opcao.valor" x-text="opcao.label"></option>
                  </template>
                </select>
              </template>

            </div>
          </template>

        </div>
      </template>
    </div>

    <!-- Sombra de scroll -->
    <div id="scroll-sombra"></div>

  </div>

  <!-- RODAPÉ: botões fixos — não rolam -->
  <div class="nav">
    <button type="button" @click="anterior()" x-show="secaoAtual > 0">← Anterior</button>
    <button type="button" @click="proximo()"
            x-show="secaoAtual < secoesVisiveis().length - 1">Próximo →</button>
    <button type="submit" @click="enviar()"
            x-show="secaoAtual === secoesVisiveis().length - 1">Enviar</button>
  </div>

</div>

<script>
const SECOES = [

      { id: 'passaporte_validade', label: 'Data de Validade', tipo: 'date', obrigatorio: true },

    ]
  },
  {
    id: 'contato_endereco',

      { id: 'rua', label: 'Rua', tipo: 'text', obrigatorio: true },

      { id: 'email', label: 'E-mail', tipo: 'email', obrigatorio: true },
      { id: 'redes_sociais', label: 'Redes Sociais', tipo: 'textarea', hint: 'Facebook, Instagram, Twitter, LinkedIn etc. Ao menos 2 se possível. Ex: Facebook = Antonio Rossi / Instagram = @rossiantonio.' },

          { valor: 'nao', label: 'Não' },

      },
    ]
  },
  {
    id: 'custos_viagem_endereco',
    titulo: 'Endereço do Responsável pelos Custos',
    condicao: "respostas.custo_viagem === 'outra_pessoa' && respostas.custo_mesmo_endereco === 'nao'",
    campos: [
      { id: 'custo_rua', label: 'Rua', tipo: 'text', obrigatorio: true },
      { id: 'custo_numero', label: 'Número', tipo: 'text', obrigatorio: true },
      { id: 'custo_bairro', label: 'Bairro', tipo: 'text', obrigatorio: true },
      { id: 'custo_cidade_estado', label: 'Cidade/Estado', tipo: 'text', obrigatorio: true, hint: 'Ex: Campinas/SP.' },
      { id: 'custo_cep', label: 'CEP', tipo: 'text', obrigatorio: true, hint: 'Apenas números.' },
    ]
  },
  {
    id: 'acompanhantes',
    titulo: 'Acompanhantes da Viagem',
    campos: [
      { id: 'acompanhantes', label: 'Quem irá viajar com você?', tipo: 'textarea', obrigatorio: true, hint: 'Nome completo e grau de parentesco. Ex: João Silva = Pai / Larissa Medeiros = Esposa. Se for sozinho, escreva Ninguém.' },
    ]
  },
  {
    id: 'entradas_eua_negado',
    titulo: 'Entradas nos Estados Unidos',
    campos: [
      { id: 'visto_negado', label: 'Já teve visto negado?', tipo: 'textarea', obrigatorio: true, hint: 'Se sim, quando? Se não, escreva Não.' },

  },
  {

    campos: [
      {
        id: 'visto_emitido',
        label: 'Já teve um visto americano emitido?',

        obrigatorio: true,
        opcoes: [
          { valor: 'sim', label: 'Sim' },
          { valor: 'nao', label: 'Não' },
        ]
      },
    ]
  },
  {
    id: 'historico_eua',
    titulo: 'Histórico nos Estados Unidos',
    descricao: 'Preencha as informações do visto anterior.',
    condicao: "respostas.visto_emitido === 'sim'",
    campos: [
      { id: 'historico_entradas', label: 'Quando você foi para os EUA?', tipo: 'textarea', obrigatorio: true, hint: 'Data das 5 últimas entradas e permanência. Ex: 17/12/1999 = 2 meses. Se teve visto mas não usou, escreva N.A.' },

      { id: 'pai_nascimento', label: 'Data de Nascimento do Pai', tipo: 'date', obrigatorio: true },

      { id: 'mae_nascimento', label: 'Data de Nascimento da Mãe', tipo: 'date', obrigatorio: true },

function formulario() {
  return {
    secaoAtual: 0,
    respostas: {},

    avaliaCondicaoSecao(condicao) {
      if (!condicao) return true;
      try {
        return new Function('respostas', `return ${condicao}`)(this.respostas);
      } catch { return true; }
    },

    avaliaCondicao(condicao) {
      if (!condicao) return true;
      try {
        return new Function('respostas', `return ${condicao}`)(this.respostas);
      } catch { return true; }
    },

    secoesVisiveis() {
      return SECOES.filter(s => this.avaliaCondicaoSecao(s.condicao));
    },

    aoSairDoCampo(campoId) {
      const valor = this.respostas[campoId];
      console.log(`Campo atualizado: ${campoId} = ${valor}`);
      // TODO: auto-save no Redis
      // TODO: validação com IA (async)
    },

    proximo() {
      const visiveis = this.secoesVisiveis();
      if (this.secaoAtual < visiveis.length - 1) {
        this.secaoAtual++;
        const c = document.getElementById('conteudo');
        c.scrollTop = 0;
        // Reavalia sombra após troca de seção
        setTimeout(() => atualizaSombra(c), 50);
      }
    },

    anterior() {
      if (this.secaoAtual > 0) {
        this.secaoAtual--;
        const c = document.getElementById('conteudo');
        c.scrollTop = 0;
        setTimeout(() => atualizaSombra(c), 50);
      }
    },

    enviar() {
      console.log('Respostas finais:', this.respostas);
      alert('Formulário enviado! (conecte ao backend aqui)');
    },
  };
}

// =============================================
// SOMBRA DE SCROLL
// Aparece quando há conteúdo abaixo do visível
// =============================================
function atualizaSombra(el) {
  const sombra = document.getElementById('scroll-sombra');
  const temMaisAbaixo = el.scrollTop + el.clientHeight < el.scrollHeight - 4;
  sombra.classList.toggle('visivel', temMaisAbaixo);
}

document.addEventListener('DOMContentLoaded', () => {
  const conteudo = document.getElementById('conteudo');

  // Listener de scroll
  conteudo.addEventListener('scroll', () => atualizaSombra(conteudo));

  // Verifica ao carregar e quando Alpine atualiza o DOM
  setTimeout(() => atualizaSombra(conteudo), 300);
});
</script>
