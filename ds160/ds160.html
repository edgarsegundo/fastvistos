<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rascunho DS-160</title>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    /* =============================================
       BASE — mobile-first, sem estilo decorativo
       Altere aqui para customizar globalmente
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      font-size: 16px; /* nunca abaixo de 16px em mobile para evitar zoom */
      line-height: 1.5;
      padding: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Cada campo empilhado verticalmente */
    .campo {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.5rem;
    }

    label { font-weight: bold; }
    .hint { font-size: 0.85rem; color: #555; }
    .obrigatorio { color: red; }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      font-size: 1rem;
      padding: 0.6rem 0.5rem;
      border: 1px solid #999;
      border-radius: 4px;
    }

    textarea { min-height: 80px; resize: vertical; }

    /* Radio e checkbox em coluna para facilitar toque */
    .opcoes { display: flex; flex-direction: column; gap: 0.6rem; }
    .opcoes label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: normal;
      cursor: pointer;
      padding: 0.4rem 0;
    }
    .opcoes input { width: 1.2rem; height: 1.2rem; flex-shrink: 0; }

    /* Separador de seção */
    .secao {
      border-top: 2px solid #000;
      padding-top: 1rem;
      margin-top: 2rem;
    }
    .secao h2 { font-size: 1.1rem; margin-bottom: 0.3rem; }
    .secao .descricao { font-size: 0.85rem; color: #444; margin-bottom: 1rem; }

    /* Navegação */
    .nav {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
      gap: 1rem;
    }
    .nav button {
      flex: 1;
      padding: 0.8rem;
      font-size: 1rem;
      cursor: pointer;
      border: 1px solid #000;
      background: #fff;
      border-radius: 4px;
    }
    .nav button[type="submit"] { background: #000; color: #fff; }

    /* Progresso */
    .progresso {
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #444;
    }
    .progresso-barra {
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin-top: 0.3rem;
    }
    .progresso-barra-inner {
      height: 100%;
      background: #000;
      border-radius: 2px;
      transition: width 0.3s;
    }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body>

<!--
  =============================================
  DADOS DO FORMULÁRIO
  Para adicionar/remover seções: edite o array
  `secoes` dentro do x-data abaixo.
  Cada seção tem: id, titulo, descricao, campos[]
  Cada campo tem: id, label, tipo, hint, obrigatorio,
    opcoes[] (para radio/select), condicao (Alpine expr)
  =============================================
-->
<div x-data="formulario()" x-cloak>

  <!-- Progresso -->
  <div class="progresso">
    Seção <span x-text="secaoAtual + 1"></span> de <span x-text="secoesVisiveis().length"></span>:
    <strong x-text="secoesVisiveis()[secaoAtual]?.titulo"></strong>
    <div class="progresso-barra">
      <div class="progresso-barra-inner"
           :style="`width: ${((secaoAtual + 1) / secoesVisiveis().length) * 100}%`"></div>
    </div>
  </div>

  <!-- Renderiza a seção atual -->
  <template x-for="(secao, idx) in secoesVisiveis()" :key="secao.id">
    <div x-show="secaoAtual === idx">

      <div class="secao">
        <h2 x-text="secao.titulo"></h2>
        <p class="descricao" x-text="secao.descricao" x-show="secao.descricao"></p>
      </div>

      <!-- Renderiza cada campo da seção -->
      <template x-for="campo in secao.campos" :key="campo.id">
        <div class="campo" x-show="avaliaCondicao(campo.condicao)">

          <label :for="campo.id">
            <span x-text="campo.label"></span>
            <span class="obrigatorio" x-show="campo.obrigatorio"> *</span>
          </label>

          <span class="hint" x-show="campo.hint" x-text="campo.hint"></span>

          <!-- Texto simples -->
          <template x-if="campo.tipo === 'text'">
            <input type="text" :id="campo.id" :name="campo.id"
                   x-model="respostas[campo.id]"
                   @blur="aoSairDoCampo(campo.id)" />
          </template>

          <!-- Email -->
          <template x-if="campo.tipo === 'email'">
            <input type="email" :id="campo.id" :name="campo.id"
                   x-model="respostas[campo.id]"
                   @blur="aoSairDoCampo(campo.id)" />
          </template>

          <!-- Telefone -->
          <template x-if="campo.tipo === 'tel'">
            <input type="tel" :id="campo.id" :name="campo.id"
                   x-model="respostas[campo.id]"
                   @blur="aoSairDoCampo(campo.id)" />
          </template>

          <!-- Data -->
          <template x-if="campo.tipo === 'date'">
            <input type="date" :id="campo.id" :name="campo.id"
                   x-model="respostas[campo.id]"
                   @blur="aoSairDoCampo(campo.id)" />
          </template>

          <!-- Textarea -->
          <template x-if="campo.tipo === 'textarea'">
            <textarea :id="campo.id" :name="campo.id"
                      x-model="respostas[campo.id]"
                      @blur="aoSairDoCampo(campo.id)"></textarea>
          </template>

          <!-- Radio -->
          <template x-if="campo.tipo === 'radio'">
            <div class="opcoes">
              <template x-for="opcao in campo.opcoes" :key="opcao.valor">
                <label>
                  <input type="radio" :name="campo.id" :value="opcao.valor"
                         x-model="respostas[campo.id]"
                         @change="aoSairDoCampo(campo.id)" />
                  <span x-text="opcao.label"></span>
                </label>
              </template>
            </div>
          </template>

          <!-- Select -->
          <template x-if="campo.tipo === 'select'">
            <select :id="campo.id" :name="campo.id"
                    x-model="respostas[campo.id]"
                    @change="aoSairDoCampo(campo.id)">
              <option value="">Selecione...</option>
              <template x-for="opcao in campo.opcoes" :key="opcao.valor">
                <option :value="opcao.valor" x-text="opcao.label"></option>
              </template>
            </select>
          </template>

        </div>
      </template>

      <!-- Navegação -->
      <div class="nav">
        <button type="button" @click="anterior()" x-show="secaoAtual > 0">← Anterior</button>
        <button type="button" @click="proximo()"
                x-show="secaoAtual < secoesVisiveis().length - 1">Próximo →</button>
        <button type="submit" @click="enviar()"
                x-show="secaoAtual === secoesVisiveis().length - 1">Enviar</button>
      </div>

    </div>
  </template>

</div>

<script>

function formulario() {

    avaliaCondicaoSecao(condicao) {
      if (!condicao) return true;
      try {
        return new Function('respostas', `return ${condicao}`)(this.respostas);
      } catch { return true; }
    },

    // Avalia se um campo deve aparecer
    avaliaCondicao(condicao) {
      if (!condicao) return true;
      try {
        return new Function('respostas', `return ${condicao}`)(this.respostas);
      } catch { return true; }
    },

    // Retorna apenas seções que devem ser exibidas
    secoesVisiveis() {
      return SECOES.filter(s => this.avaliaCondicaoSecao(s.condicao));
